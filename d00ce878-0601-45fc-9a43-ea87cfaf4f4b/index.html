// ============================================================
//  DRAW: GAME OVER
// ============================================================
function drawGameOver() {
  const isWin = G.level >= LEVELS.length && G.lives > 0;
  const pulse = 0.8 + Math.sin(Date.now() * 0.005) * 0.2;

  // Dark overlay with edge vignette
  const vigGrad = ctx.createRadialGradient(W/2, H/2, 100, W/2, H/2, 500);
  vigGrad.addColorStop(0, isWin ? 'rgba(0,0,0,0.5)' : 'rgba(0,0,0,0.6)');
  vigGrad.addColorStop(1, isWin ? 'rgba(0,0,0,0.8)' : 'rgba(0,0,0,0.9)');
  ctx.fillStyle = vigGrad;
  ctx.fillRect(0, 0, W, H);

  ctx.textAlign = 'center';

  // Floating particles
  for (let i = 0; i < (isWin ? 20 : 8); i++) {
    const sx = (i * 91 + 23 + Date.now() * 0.01 * (i % 2 + 1)) % W;
    const sy = (i * 53 + 10 + Math.sin(Date.now() * 0.004 + i * 3) * 15);
    const col = isWin ? '#ffd700' : '#e74c3c';
    ctx.fillStyle = `rgba(${isWin ? '255,215,0' : '231,76,60'},${0.1 + Math.sin(Date.now() * 0.005 + i) * 0.08})`;
    ctx.beginPath();
    ctx.arc(sx, sy, 1.5 + Math.sin(Date.now() * 0.006 + i * 2) * 1, 0, Math.PI * 2);
    ctx.fill();
  }

  // Title
  const titleColor = isWin ? '#ffd700' : '#e74c3c';
  ctx.shadowColor = titleColor;
  ctx.shadowBlur = 30 * pulse;
  ctx.fillStyle = titleColor;
  ctx.font = 'bold 48px sans-serif';
  ctx.fillText(isWin ? '🏆 全部通关！ 🏆' : '💀 游戏结束', W / 2, H / 2 - 90);
  ctx.shadowBlur = 0;

  if (!isWin && G.lives <= 0) {
    ctx.fillStyle = '#ff6b6b';
    ctx.font = '18px sans-serif';
    ctx.fillText('小鸟全部耗尽...', W / 2, H / 2 - 50);
  } else if (!isWin && G.levelTimer <= 0) {
    ctx.fillStyle = '#ff6b6b';
    ctx.font = '18px sans-serif';
    ctx.fillText('时间耗尽...', W / 2, H / 2 - 50);
  }

  // Score panel
  ctx.fillStyle = '#fff';
  ctx.font = '22px sans-serif';
  ctx.fillText('最终得分: ' + G.score, W / 2, H / 2);

  // New record check
  const isNewRecord = G.score >= G.highScore && G.score > 0;
  if (isNewRecord) {
    ctx.shadowColor = '#ffd700';
    ctx.shadowBlur = 20 * pulse;
    ctx.fillStyle = '#ffd700';
    ctx.font = 'bold 20px sans-serif';
    ctx.fillText('🎉 新纪录！ 🎉', W / 2, H / 2 + 35);
    ctx.shadowBlur = 0;
  } else {
    ctx.fillStyle = '#aaa';
    ctx.font = '16px sans-serif';
    ctx.fillText('最高分: ' + G.highScore, W / 2, H / 2 + 35);
  }

  // Stats panel
  const stX = W / 2 - 120, stY = H / 2 + 55, stW = 240, stH = 60;
  ctx.fillStyle = 'rgba(0,0,0,0.4)';
  roundRect(ctx, stX, stY, stW, stH, 8);
  ctx.fill();
  ctx.strokeStyle = 'rgba(255,255,255,0.08)';
  ctx.lineWidth = 1;
  ctx.stroke();

  ctx.fillStyle = '#ccc';
  ctx.font = '15px sans-serif';
  ctx.fillText('到达关卡: ' + (G.level + 1) + ' / ' + LEVELS.length, W / 2, stY + 22);
  ctx.fillText('消灭猪数: ' + G.pigsKilled + ' / ' + G.totalPigs, W / 2, stY + 45);

  // Restart button
  ctx.fillStyle = 'rgba(255,255,255,0.15)';
  roundRect(ctx, W/2 - 70, H/2 + 135, 140, 36, 8);
  ctx.fill();
  ctx.fillStyle = '#eee';
  ctx.font = '17px sans-serif';
  ctx.fillText('按 R 重新开始', W / 2, H / 2 + 160);

  ctx.textAlign = 'left';
}

// ============================================================
//  COLOR HELPERS
// ============================================================
function lightenColor(hex, amt) {
  let r = parseInt(hex.slice(1, 3), 16);
  let g = parseInt(hex.slice(3, 5), 16);
  let b = parseInt(hex.slice(5, 7), 16);
  r = Math.min(255, r + amt);
  g = Math.min(255, g + amt);
  b = Math.min(255, b + amt);
  return '#' + r.toString(16).padStart(2,'0') + g.toString(16).padStart(2,'0') + b.toString(16).padStart(2,'0');
}
function darkenColor(hex, amt) {
  let r = parseInt(hex.slice(1, 3), 16);
  let g = parseInt(hex.slice(3, 5), 16);
  let b = parseInt(hex.slice(5, 7), 16);
  r = Math.max(0, r - amt);
  g = Math.max(0, g - amt);
  b = Math.max(0, b - amt);
  return '#' + r.toString(16).padStart(2,'0') + g.toString(16).padStart(2,'0') + b.toString(16).padStart(2,'0');
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

// ============================================================
//  RESIZE
// ============================================================
function resize() {
  const maxW = window.innerWidth * 0.95;
  const maxH = window.innerHeight * 0.95;
  const scale = Math.min(maxW / W, maxH / H);
  canvas.style.width = (W * scale) + 'px';
  canvas.style.height = (H * scale) + 'px';
}
window.addEventListener('resize', resize);
resize();

// ============================================================
//  GAME LOOP
// ============================================================
function gameLoop() {
  update();
  draw();
  requestAnimationFrame(gameLoop);
}

// ============================================================
//  START
// ============================================================
resetGame();
buildBackgroundCache();
gameLoop();

</script>
