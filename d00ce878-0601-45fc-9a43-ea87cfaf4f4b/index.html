<title>愤怒小鸟 - 神射手</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #1a2a1a; display: flex; justify-content: center; align-items: center; min-height: 100vh; font-family: 'Comic Sans MS', 'Chalkboard SE', cursive, sans-serif; overflow: hidden; user-select: none; }
canvas { display: block; border-radius: 8px; box-shadow: 0 0 40px rgba(0,0,0,0.5); }

/* Game container wraps canvas for overlaying mobile controls */
#game-container { position: relative; display: inline-block; }

/* Mobile virtual controls container */
#mobile-controls {
  position: absolute; top: 0; left: 0;
  width: 100%; height: 100%;
  pointer-events: none;
  z-index: 10;
  display: none;
}
#mobile-controls.active { display: block; }

/* D-Pad (bottom-left) */
#dpad {
  position: absolute;
  bottom: 15px;
  left: 10px;
  pointer-events: auto;
  user-select: none;
  -webkit-user-select: none;
  touch-action: none;
  -webkit-touch-callout: none;
}
.dpad-btn {
  width: 56px; height: 56px;
  margin: 2px;
  border-radius: 16px;
  background: rgba(0,0,0,0.35);
  border: 2px solid rgba(255,255,255,0.25);
  color: #fff;
  font-size: 22px;
  line-height: 56px;
  text-align: center;
  cursor: pointer;
  touch-action: none;
  -webkit-touch-callout: none;
  user-select: none;
  -webkit-user-select: none;
  outline: none;
  transition: background 0.1s, transform 0.1s;
}
.dpad-btn.active, .dpad-btn:active {
  background: rgba(255,255,255,0.35);
  border-color: rgba(255,255,255,0.5);
  transform: scale(0.92);
}
.dpad-row {
  display: flex;
  justify-content: center;
  gap: 2px;
}
#dpad > .dpad-btn {
  display: block;
  margin: 0 auto 2px;
}

/* Action buttons (bottom-right) */
#action-buttons {
  position: absolute;
  bottom: 20px;
  right: 10px;
  display: flex;
  flex-direction: column;
  gap: 8px;
  pointer-events: auto;
}
.action-btn {
  width: 76px; height: 50px;
  border-radius: 16px;
  background: rgba(0,0,0,0.35);
  border: 2px solid rgba(255,255,255,0.25);
  color: #fff;
  font-size: 13px;
  font-weight: bold;
  text-align: center;
  line-height: 50px;
  cursor: pointer;
  touch-action: none;
  -webkit-touch-callout: none;

  -webkit-user-select: none;
  outline: none;
  transition: background 0.1s, transform 0.1s;
}
.action-btn.active, .action-btn:active {
  background: rgba(255,255,255,0.35);
  border-color: rgba(255,255,255,0.5);
  transform: scale(0.92);
}
