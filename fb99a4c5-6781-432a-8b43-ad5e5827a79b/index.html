<body>
<canvas id="game"></canvas>
<script>
// ═══════════════════════════════════════════════════════════════
//  星轨弹球大作战 — Star Rail Pinball Battle
// ═══════════════════════════════════════════════════════════════

const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

// ─── Constants ───
const W = 800, H = 600;
const PADDLE_W = 120;
const PADDLE_H = 14;
const PADDLE_R = 7;
const BALL_R = 9;
const STAR_OUTER = 20, STAR_INNER = 8;
const FRAG_R = 4;
const GRAVITY = 420;
const BOUNCE = 0.82;
const FRICTION = 0.98;
const MAX_LIVES = 3;
const WIN_SCORE = 100;
const GAME_TIME = 90;
const TRAIL_LEN = 18;
const MAGNETIC_ZONE_RATIO = 0.28;
const MAX_STARS = 12;
const STAR_SPAWN_MIN = 1.0;
const STAR_SPAWN_MAX = 2.8;

// ─── Canvas sizing ───
let scale = 1, ox = 0, oy = 0;
function fitCanvas() {
  const sw = window.innerWidth, sh = window.innerHeight;
  scale = Math.min(sw / W, sh / H);
  const cw = Math.floor(W * scale), ch = Math.floor(H * scale);
  canvas.width = cw;
  canvas.height = ch;
  canvas.style.width = cw + 'px';
  canvas.style.height = ch + 'px';
  ox = (cw - W * scale) / 2;
  oy = (ch - H * scale) / 2;
}
fitCanvas();
window.addEventListener('resize', fitCanvas);

// ─── Coordinate helpers ───
function sw(sx, sy) {
  return { x: (sx - ox) / scale, y: (sy - oy) / scale };
}

// ─── Random helpers ───
function rand(a, b) { return a + Math.random() * (b - a); }
function randInt(a, b) { return Math.floor(rand(a, b + 1)); }
function lerp(a, b, t) { return a + (b - a) * t; }
function clamp(v, mn, mx) { return Math.max(mn, Math.min(mx, v)); }

// ─── Audio ───
let audioCtx = null;
function initAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
}
const sfx = {
  bounce() {
    initAudio();
    const o = audioCtx.createOscillator(), g = audioCtx.createGain();
    o.connect(g); g.connect(audioCtx.destination);
    o.type = 'sine'; o.frequency.setValueAtTime(440, audioCtx.currentTime);
    o.frequency.exponentialRampToValueAtTime(320, audioCtx.currentTime + 0.06);
    g.gain.setValueAtTime(0.08, audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.07);
    o.start(); o.stop(audioCtx.currentTime + 0.07);
  },
  starHit() {
    initAudio();
    const o = audioCtx.createOscillator(), g = audioCtx.createGain();
    o.connect(g); g.connect(audioCtx.destination);
    o.type = 'sine';
    o.frequency.setValueAtTime(660, audioCtx.currentTime);
    o.frequency.exponentialRampToValueAtTime(1320, audioCtx.currentTime + 0.1);
    g.gain.setValueAtTime(0.12, audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.18);
    o.start(); o.stop(audioCtx.currentTime + 0.18);
    // second harmonic
    const o2 = audioCtx.createOscillator(), g2 = audioCtx.createGain();
    o2.connect(g2); g2.connect(audioCtx.destination);
    o2.type = 'sine';
    o2.frequency.setValueAtTime(880, audioCtx.currentTime + 0.05);
    o2.frequency.exponentialRampToValueAtTime(1760, audioCtx.currentTime + 0.12);
    g2.gain.setValueAtTime(0.06, audioCtx.currentTime + 0.05);
    g2.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.18);
    o2.start(audioCtx.currentTime + 0.05); o2.stop(audioCtx.currentTime + 0.18);
  },
  fragment() {
    initAudio();
    const o = audioCtx.createOscillator(), g = audioCtx.createGain();
    o.connect(g); g.connect(audioCtx.destination);
    o.type = 'sine';
    o.frequency.setValueAtTime(1200, audioCtx.currentTime);
    o.frequency.exponentialRampToValueAtTime(1800, audioCtx.currentTime + 0.05);
    g.gain.setValueAtTime(0.06, audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.08);
    o.start(); o.stop(audioCtx.currentTime + 0.08);
  },
  chargeUp(level) {
    initAudio();
    const o = audioCtx.createOscillator(), g = audioCtx.createGain();
    o.connect(g); g.connect(audioCtx.destination);
    o.type = 'sine';
    const freq = 200 + level * 400;
    o.frequency.setValueAtTime(freq, audioCtx.currentTime);
    g.gain.setValueAtTime(0.03, audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.12);
    o.start(); o.stop(audioCtx.currentTime + 0.12);
  },
  fire() {
    initAudio();
    const o = audioCtx.createOscillator(), g = audioCtx.createGain();
    o.connect(g); g.connect(audioCtx.destination);
    o.type = 'sawtooth';
    o.frequency.setValueAtTime(300, audioCtx.currentTime);
    o.frequency.exponentialRampToValueAtTime(1200, audioCtx.currentTime + 0.12);
    g.gain.setValueAtTime(0.10, audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.15);
    o.start(); o.stop(audioCtx.currentTime + 0.15);
  },
  loseLife() {
    initAudio();
    const o = audioCtx.createOscillator(), g = audioCtx.createGain();
    o.connect(g); g.connect(audioCtx.destination);
    o.type = 'square';
    o.frequency.setValueAtTime(300, audioCtx.currentTime);
    o.frequency.exponentialRampToValueAtTime(60, audioCtx.currentTime + 0.4);
    g.gain.setValueAtTime(0.10, audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.5);
    o.start(); o.stop(audioCtx.currentTime + 0.5);
  },
  win() {
    initAudio();
    [523, 659, 784, 1047].forEach((f, i) => {
      const o = audioCtx.createOscillator(), g = audioCtx.createGain();
      o.connect(g); g.connect(audioCtx.destination);
      o.type = 'sine';
      o.frequency.setValueAtTime(f, audioCtx.currentTime + i * 0.15);
      g.gain.setValueAtTime(0.10, audioCtx.currentTime + i * 0.15);
      g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + i * 0.15 + 0.3);
      o.start(audioCtx.currentTime + i * 0.15);
      o.stop(audioCtx.currentTime + i * 0.15 + 0.3);
    });
  },
  gameOver() {
    initAudio();
    [400, 350, 300, 200].forEach((f, i) => {
      const o = audioCtx.createOscillator(), g = audioCtx.createGain();
      o.connect(g); g.connect(audioCtx.destination);
      o.type = 'sawtooth';
      o.frequency.setValueAtTime(f, audioCtx.currentTime + i * 0.2);
      g.gain.setValueAtTime(0.08, audioCtx.currentTime + i * 0.2);
      g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + i * 0.2 + 0.3);
      o.start(audioCtx.currentTime + i * 0.2);
      o.stop(audioCtx.currentTime + i * 0.2 + 0.3);
    });
  }
};

// ─── Input ───
const input = {
  mouseX: W / 2, mouseY: H / 2,
  clickHeld: false, clickJustDown: false, clickJustUp: false,
  doubleTap: false,
  touchActive: false,
  _lastTap: 0,
  _tapX: 0, _tapY: 0,
  _touchId: null,

  update() {
    this.clickJustDown = false;
    this.clickJustUp = false;
    this.doubleTap = false;
  }
};

// Mouse
canvas.addEventListener('mousemove', e => {
  const r = canvas.getBoundingClientRect();
  const p = sw(e.clientX - r.left, e.clientY - r.top);
  input.mouseX = p.x;
  input.mouseY = p.y;
});
canvas.addEventListener('mousedown', e => {
  e.preventDefault();
  input.clickHeld = true;
  input.clickJustDown = true;
  initAudio();
});
canvas.addEventListener('mouseup', e => {
  e.preventDefault();
  input.clickHeld = false;
  input.clickJustUp = true;
});
canvas.addEventListener('mouseleave', () => {
  // keep position but release
  input.clickHeld = false;
});

// Touch
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  const t = e.changedTouches[0];
  if (input._touchId === null) input._touchId = t.identifier;
  // Only track the primary touch
  if (t.identifier !== input._touchId && input._touchId !== null) return;

  const r = canvas.getBoundingClientRect();
  const p = sw(t.clientX - r.left, t.clientY - r.top);
  input.mouseX = p.x;
  input.mouseY = p.y;
  input.touchActive = true;

  // Double-tap detection
  const now = performance.now();
  if (now - input._lastTap < 350 && Math.abs(t.clientX - input._tapX) < 40 && Math.abs(t.clientY - input._tapY) < 40) {
    input.doubleTap = true;
    input._lastTap = 0;
  } else {
    input._lastTap = now;
    input._tapX = t.clientX;
    input._tapY = t.clientY;
    // Single tap also counts as click for menus
    input.clickJustDown = true;
  }
  initAudio();
}, { passive: false });

canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  for (const t of e.changedTouches) {
    if (t.identifier !== input._touchId) continue;
    const r = canvas.getBoundingClientRect();
    const p = sw(t.clientX - r.left, t.clientY - r.top);
    input.mouseX = p.x;
    input.mouseY = p.y;
    break;
  }
}, { passive: false });

canvas.addEventListener('touchend', e => {
  e.preventDefault();
  for (const t of e.changedTouches) {
    if (t.identifier !== input._touchId) continue;
    input._touchId = null;
    input.touchActive = false;
    input.clickHeld = false;
    input.clickJustUp = true;
    break;
  }
}, { passive: false });

canvas.addEventListener('touchcancel', e => {
  input._touchId = null;
  input.touchActive = false;
  input.clickHeld = false;
});

// ─── Background stars (twinkling) ───
class BGStar {
  constructor() {
    this.x = rand(0, W);
    this.y = rand(0, H);
    this.size = rand(0.5, 2.2);
    this.baseAlpha = rand(0.2, 0.9);
    this.twinkleSpeed = rand(1, 4);
    this.twinklePhase = rand(0, Math.PI * 2);
    this.hue = rand(180, 300); // blue to purple
  }
  getAlpha(time) {
    return this.baseAlpha * (0.6 + 0.4 * Math.sin(time * this.twinkleSpeed + this.twinklePhase));
  }
}
const bgStars = [];
for (let i = 0; i < 200; i++) bgStars.push(new BGStar());

// ─── Nebula clouds ───
class Nebula {
  constructor() {
    this.x = rand(0, W);
    this.y = rand(0, H);
    this.radius = rand(150, 350);
    this.hue1 = rand(200, 320);
    this.hue2 = rand(240, 340);
    this.alpha = rand(0.04, 0.10);
    this.driftX = rand(-3, 3);
    this.driftY = rand(-2, 2);
  }
  update(dt) {
    this.x += this.driftX * dt;
    this.y += this.driftY * dt;
    if (this.x < -this.radius) this.x = W + this.radius;
    if (this.x > W + this.radius) this.x = -this.radius;
    if (this.y < -this.radius) this.y = H + this.radius;
    if (this.y > H + this.radius) this.y = -this.radius;
  }
  draw(ctx, time) {
    const grad = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, this.radius);
    const a = this.alpha * (0.85 + 0.15 * Math.sin(time * 0.3 + this.x));
    grad.addColorStop(0, `hsla(${this.hue1}, 80%, 60%, ${a * 0.5})`);
    grad.addColorStop(0.3, `hsla(${this.hue2}, 70%, 40%, ${a * 0.3})`);
    grad.addColorStop(0.7, `hsla(${this.hue1}, 60%, 30%, ${a * 0.15})`);
    grad.addColorStop(1, `hsla(${this.hue2}, 50%, 20%, 0)`);
    ctx.fillStyle = grad;
    ctx.fillRect(this.x - this.radius, this.y - this.radius, this.radius * 2, this.radius * 2);
  }
}
const nebulae = [];
for (let i = 0; i < 3; i++) nebulae.push(new Nebula());

// ─── Galaxy arm ───
function drawGalaxy(ctx, time) {
  ctx.save();
  const cx = W * 0.6, cy = H * 0.35;
  const grad = ctx.createLinearGradient(0, 0, W, H);
  grad.addColorStop(0, 'rgba(100, 140, 255, 0.06)');
  grad.addColorStop(0.3, 'rgba(180, 120, 255, 0.10)');
  grad.addColorStop(0.5, 'rgba(220, 180, 255, 0.14)');
  grad.addColorStop(0.7, 'rgba(180, 120, 255, 0.10)');
  grad.addColorStop(1, 'rgba(100, 140, 255, 0.04)');
  ctx.fillStyle = grad;

  ctx.beginPath();
  ctx.moveTo(cx, cy);
  for (let t = 0; t <= 1; t += 0.01) {
    const angle = t * Math.PI * 3 + time * 0.02;
    const r = t * 280;
    const px = cx + r * Math.cos(angle);
    const py = cy + r * Math.sin(angle) * 0.6;
    ctx.lineTo(px, py);
  }
  for (let t = 1; t >= 0; t -= 0.01) {
    const angle = t * Math.PI * 3 + time * 0.02 + 0.3;
    const r = t * 270;
    const px = cx + r * Math.cos(angle);
    const py = cy + r * Math.sin(angle) * 0.6;
    ctx.lineTo(px, py);
  }
  ctx.closePath();
  ctx.fill();
  ctx.restore();
}

// ─── Particle system ───
const particles = [];
class Particle {
  constructor(x, y, color, life, size, vx, vy) {
    this.x = x;
    this.y = y;
    this.vx = vx || rand(-80, 80);
    this.vy = vy || rand(-120, 20);
    this.color = color;
    this.life = life || rand(0.4, 1.0);
    this.maxLife = this.life;
    this.size = size || rand(2, 6);
    this.gravity = rand(30, 80);
  }
  update(dt) {
    this.x += this.vx * dt;
    this.y += this.vy * dt;
    this.vy += this.gravity * dt;
    this.life -= dt;
  }
  draw(ctx) {
    const alpha = clamp(this.life / this.maxLife, 0, 1);
    ctx.globalAlpha = alpha;
    ctx.fillStyle = this.color;
    const s = this.size * (0.3 + 0.7 * alpha);
    ctx.beginPath();
    ctx.arc(this.x, this.y, s, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;
  }
}
function emitParticles(x, y, color, count, speed, life) {
  for (let i = 0; i < count; i++) {
    const angle = rand(0, Math.PI * 2);
    const spd = rand(speed * 0.3, speed);
    particles.push(new Particle(
      x + rand(-5, 5), y + rand(-5, 5),
      color, life, rand(1.5, 4.5),
      Math.cos(angle) * spd, Math.sin(angle) * spd
    ));
  }
}

// ─── Game state ───
const game = {
  state: 'menu', // menu | playing | gameover | won
  score: 0,
  lives: MAX_LIVES,
  timeLeft: GAME_TIME,
  elapsed: 0,
  ballLostTimer: 0,
  spawnTimer: 0,
  chargeLevel: 0,
  isCharging: false,
  ballStuck: false,
  ballStuckTimer: 0,
  piercingHits: 0,
  maxPiercing: 3,
  stars: [],
  fragments: [],
  comboCount: 0,

  // objects
  paddle: { x: W / 2 - PADDLE_W / 2, y: H - 35, w: PADDLE_W, h: PADDLE_H },
  ball: null,

  reset() {
    this.state = 'menu';
    this.score = 0;
    this.lives = MAX_LIVES;
    this.timeLeft = GAME_TIME;
    this.elapsed = 0;
    this.ballLostTimer = 0;
    this.spawnTimer = rand(1, 2);
    this.chargeLevel = 0;
    this.isCharging = false;
    this.ballStuck = false;
    this.piercingHits = 0;
    this.stars = [];
    this.fragments = [];
    particles.length = 0;
    this.comboCount = 0;
    this.paddle.x = W / 2 - PADDLE_W / 2;
    this.ball = null;
  },

  startGame() {
    this.state = 'playing';
    this.score = 0;
    this.lives = MAX_LIVES;
    this.timeLeft = GAME_TIME;
    this.elapsed = 0;
    this.ballLostTimer = 0;
    this.spawnTimer = rand(1, 2);
    this.chargeLevel = 0;
    this.isCharging = false;
    this.ballStuck = false;
    this.piercingHits = 0;
    this.stars = [];
    this.fragments = [];
    particles.length = 0;
    this.comboCount = 0;
    this.paddle.x = W / 2 - PADDLE_W / 2;
    this.spawnBall();
  },

  spawnBall() {
    this.ball = {
      x: rand(100, W - 100),
      y: 30,
      vx: rand(-60, 60),
      vy: rand(80, 140),
      r: BALL_R,
      trail: [],
      piercing: 0,
      stuck: false,
      stuckEdge: 0, // -1 for left, 1 for right
      stuckOffset: 0,
    };
    this.ballStuck = false;
    this.ballStuckTimer = 0;
    this.isCharging = false;
    this.chargeLevel = 0;
    this.piercingHits = 0;
    this.comboCount = 0;
  }
};

// ─── Star (5-pointed) ───
function spawnStar() {
  if (game.stars.length >= MAX_STARS) return;
  const x = rand(50, W - 50);
  const y = rand(40, H * 0.5);
  // Check not too close to existing stars
  for (const s of game.stars) {
    const dx = s.x - x, dy = s.y - y;
    if (dx * dx + dy * dy < 1600) return; // too close
  }
  game.stars.push({
    x, y,
    outerR: STAR_OUTER,
    innerR: STAR_INNER,
    pulse: rand(0, Math.PI * 2),
    pulseSpeed: rand(1.5, 3),
    glowSize: rand(30, 50),
    alive: true,
  });
}

function drawStarShape(ctx, cx, cy, outerR, innerR, rotation) {
  ctx.beginPath();
  for (let i = 0; i < 10; i++) {
    const r = i % 2 === 0 ? outerR : innerR;
    const angle = -Math.PI / 2 + (Math.PI * 2 * i) / 10 + rotation;
    const x = cx + r * Math.cos(angle);
    const y = cy + r * Math.sin(angle);
    i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
  }
  ctx.closePath();
}

// ─── Fragment ───
function spawnFragments(x, y, count) {
  for (let i = 0; i < count; i++) {
    const angle = rand(0, Math.PI * 2);
    const speed = rand(50, 200);
    game.fragments.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed - 60,
      r: rand(2.5, 5),
      life: rand(1.5, 3.5),
      maxLife: 0,
      color: `hsl(${rand(40, 60)}, 100%, ${rand(60, 90)}%)`,
    });
  }
  for (const f of game.fragments.slice(-count)) f.maxLife = f.life;
}

// ─── Collision helpers ───
function circleRect(cx, cy, cr, rx, ry, rw, rh) {
  const nearX = clamp(cx, rx, rx + rw);
  const nearY = clamp(cy, ry, ry + rh);
  const dx = cx - nearX, dy = cy - nearY;
  return dx * dx + dy * dy < cr * cr;
}

function circleCircle(x1, y1, r1, x2, y2, r2) {
  const dx = x1 - x2, dy = y1 - y2;
  return dx * dx + dy * dy < (r1 + r2) * (r1 + r2);
}

// ─── Update ───
function update(dt) {
  game.elapsed += dt;

  // Update background
  for (const n of nebulae) n.update(dt);

  if (game.state === 'menu' || game.state === 'gameover' || game.state === 'won') {
    // Still update particles
    for (let i = particles.length - 1; i >= 0; i--) {
      particles[i].update(dt);
      if (particles[i].life <= 0) particles.splice(i, 1);
    }
    return;
  }

  // ── Playing state ──

  // Timer
  game.timeLeft -= dt;
  if (game.timeLeft <= 0) {
    game.timeLeft = 0;
    if (game.score >= WIN_SCORE) {
      game.state = 'won';
      sfx.win();
    } else {
      game.state = 'gameover';
      sfx.gameOver();
    }
    return;
  }

  // Spawn stars
  game.spawnTimer -= dt;
  if (game.spawnTimer <= 0) {
    spawnStar();
    game.spawnTimer = rand(STAR_SPAWN_MIN, STAR_SPAWN_MAX);
  }

  // Paddle movement
  const paddle = game.paddle;
  const targetX = input.mouseX - paddle.w / 2;
  paddle.x = clamp(targetX, 0, W - paddle.w);

  // Handle ball stuck state
  if (game.ballStuck && game.ball) {
    // Ball follows paddle
    const b = game.ball;
    if (b.stuckEdge < 0) {
      b.x = paddle.x + b.stuckOffset;
    } else {
      b.x = paddle.x + paddle.w - b.stuckOffset;
    }
    b.y = paddle.y - b.r;
    b.vx = 0;
    b.vy = 0;

    // Add trail dots while stuck
    b.trail.push({ x: b.x, y: b.y });
    if (b.trail.length > TRAIL_LEN) b.trail.shift();

    // Charging
    const isChargeAction = input.clickHeld || input.doubleTap;
    if (isChargeAction && !game.isCharging) {
      game.isCharging = true;
      game.chargeLevel = 0;
    }
    if (game.isCharging) {
      if (input.doubleTap) {
        // Instant full charge on double tap
        game.chargeLevel = 1.0;
        fireCharged();
      } else if (input.clickHeld) {
        game.chargeLevel = Math.min(1, game.chargeLevel + dt * 0.8);
        if (Math.random() < dt * 15) {
          sfx.chargeUp(game.chargeLevel);
        }
        // Charging particles
        if (Math.random() < dt * 20) {
          emitParticles(
            b.x + rand(-4, 4), b.y + rand(-4, 4),
            `hsl(${40 + game.chargeLevel * 20}, 100%, 70%)`,
            1, 20, 0.3
          );
        }
      }
      if (input.clickJustUp) {
        if (game.chargeLevel > 0.05) {
          fireCharged();
        } else {
          // Too little charge, just normal release
          releaseBall(false);
        }
      }
    }

    // Auto-release after 3 seconds if no action
    if (!game.isCharging && game.ballStuckTimer !== undefined) {
      game.ballStuckTimer += dt;
      if (game.ballStuckTimer > 3) {
        releaseBall(false);
      }
    }
  }

  // Ball physics
  if (game.ball && !game.ball.stuck) {
    const b = game.ball;
    b.vy += GRAVITY * dt;

    // Magnetic attraction (pre-collision)
    const magZoneW = paddle.w * MAGNETIC_ZONE_RATIO;
    const leftMag = paddle.x;
    const rightMag = paddle.x + paddle.w - magZoneW;
    const distToPaddle = paddle.y - b.y;

    if (distToPaddle > 0 && distToPaddle < 60 && b.vy > 0) {
      // Left magnetic zone
      if (b.x > paddle.x && b.x < paddle.x + magZoneW) {
        const pull = (1 - (b.x - paddle.x) / magZoneW) * 180;
        b.vx -= pull * dt;
      }
      // Right magnetic zone
      if (b.x > paddle.x + paddle.w - magZoneW && b.x < paddle.x + paddle.w) {
        const pull = ((b.x - (paddle.x + paddle.w - magZoneW)) / magZoneW) * 180;
        b.vx += pull * dt;
      }
    }

    b.x += b.vx * dt;
    b.y += b.vy * dt;

    // Trail
    b.trail.push({ x: b.x, y: b.y });
    if (b.trail.length > TRAIL_LEN) b.trail.shift();

    // Wall bounce
    if (b.x - b.r < 0) { b.x = b.r; b.vx = Math.abs(b.vx) * BOUNCE; }
    if (b.x + b.r > W) { b.x = W - b.r; b.vx = -Math.abs(b.vx) * BOUNCE; }
    if (b.y - b.r < 0) { b.y = b.r; b.vy = Math.abs(b.vy) * BOUNCE; }

    // Ball falls off bottom
    if (b.y + b.r > H + 20) {
      game.lives--;
      sfx.loseLife();
      game.ball = null;
      if (game.lives <= 0) {
        game.state = 'gameover';
        sfx.gameOver();
        return;
      }
      game.ballLostTimer = 1.0;
      return;
    }

    // Paddle collision
    if (circleRect(b.x, b.y, b.r, paddle.x, paddle.y, paddle.w, paddle.h) && b.vy > 0) {
      // Determine if in magnetic zone
      const magZoneW = paddle.w * MAGNETIC_ZONE_RATIO;
      const inLeftMag = b.x < paddle.x + magZoneW;
      const inRightMag = b.x > paddle.x + paddle.w - magZoneW;

      if (inLeftMag || inRightMag) {
        // Stick to paddle edge
        b.stuck = true;
        game.ballStuck = true;
        game.ballStuckTimer = 0;
        game.isCharging = false;
        game.chargeLevel = 0;
        if (inLeftMag) {
          b.stuckEdge = -1;
          b.stuckOffset = Math.max(5, b.x - paddle.x);
        } else {
          b.stuckEdge = 1;
          b.stuckOffset = Math.max(5, paddle.x + paddle.w - b.x);
        }
        b.y = paddle.y - b.r;
        b.vx = 0;
        b.vy = 0;
        sfx.bounce();
      } else {
        // Normal bounce — reset combo
        game.comboCount = 0;
        sfx.bounce();
        const hitPos = (b.x - (paddle.x + paddle.w / 2)) / (paddle.w / 2);
        const clamped = clamp(hitPos, -1, 1);
        const angle = clamped * (Math.PI * 70 / 180);
        const speed = Math.max(Math.sqrt(b.vx * b.vx + b.vy * b.vy) * BOUNCE, 280);
        b.vx = speed * Math.sin(angle);
        b.vy = -speed * Math.cos(angle);
        b.y = paddle.y - b.r;
      }
    }

    // Star collision
    for (let i = game.stars.length - 1; i >= 0; i--) {
      const s = game.stars[i];
      if (!s.alive) continue;
      if (circleCircle(b.x, b.y, b.r, s.x, s.y, s.outerR * 0.7)) {
        s.alive = false;
        game.score += 10;
        game.comboCount++;
        sfx.starHit();

        // Explosion particles
        const colors = ['#ffd700', '#ffec8b', '#fff8dc', '#ffa500', '#ff6347'];
        for (let ci = 0; ci < 20; ci++) {
          const a = rand(0, Math.PI * 2);
          const spd = rand(60, 250);
          const col = colors[randInt(0, colors.length - 1)];
          particles.push(new Particle(
            s.x, s.y, col, rand(0.4, 1.0), rand(2, 5),
            Math.cos(a) * spd, Math.sin(a) * spd
          ));
        }
        // Glow flash
        for (let ci = 0; ci < 8; ci++) {
          const a = rand(0, Math.PI * 2);
          particles.push(new Particle(
            s.x, s.y, '#ffffff', rand(0.1, 0.3), rand(4, 10),
            Math.cos(a) * 100, Math.sin(a) * 100
          ));
        }

        // Spawn fragments
        spawnFragments(s.x, s.y, randInt(3, 6));

        // Piercing logic
        if (b.piercing > 0) {
          b.piercing--;
          if (b.piercing <= 0) {
            emitParticles(b.x, b.y, '#00ffff', 8, 80, 0.5);
          }
          // Ball continues through
        } else {
          // Normal bounce off star
          const dx = b.x - s.x, dy = b.y - s.y;
          const dist = Math.sqrt(dx * dx + dy * dy) || 1;
          b.vx = (dx / dist) * Math.abs(b.vx) * 0.6 + (b.vx * 0.4);
          b.vy = (dy / dist) * Math.abs(b.vy) * 0.6 + (b.vy * 0.4);
          const spd = Math.max(Math.sqrt(b.vx * b.vx + b.vy * b.vy), 200);
          const norm = spd / Math.sqrt(b.vx * b.vx + b.vy * b.vy) || 1;
          b.vx *= norm;
          b.vy *= norm;
        }

        // Remove star
        game.stars.splice(i, 1);
      }
    }

    // Fire particles when piercing
    if (b.piercing > 0 && Math.random() < dt * 15) {
      emitParticles(b.x, b.y, '#00ffff', 1, 40, 0.3);
    }
  }

  // Handle ball lost respawn timer
  if (!game.ball) {
    game.ballLostTimer -= dt;
    if (game.ballLostTimer <= 0) {
      game.spawnBall();
    }
  }

  // Fragments
  for (let i = game.fragments.length - 1; i >= 0; i--) {
    const f = game.fragments[i];
    f.vy += GRAVITY * 0.6 * dt;
    f.x += f.vx * dt;
    f.y += f.vy * dt;
    f.life -= dt;

    // Fragment caught by paddle
    if (f.life > 0 && f.y > paddle.y - 5 && f.y < paddle.y + paddle.h + 5 &&
        f.x > paddle.x && f.x < paddle.x + paddle.w) {
      game.score += 5;
      sfx.fragment();
      emitParticles(f.x, f.y, '#ffe66d', 5, 60, 0.4);
      game.fragments.splice(i, 1);
      continue;
    }

    // Remove if off screen or expired
    if (f.y > H + 20 || f.x < -20 || f.x > W + 20 || f.life <= 0) {
      game.fragments.splice(i, 1);
    }
  }

  // Particles
  for (let i = particles.length - 1; i >= 0; i--) {
    particles[i].update(dt);
    if (particles[i].life <= 0) particles.splice(i, 1);
  }
}

// ─── Release ball from stuck state ───
function releaseBall(wasCharged) {
  if (!game.ball || !game.ball.stuck) return;
  const b = game.ball;
  b.stuck = false;
  game.ballStuck = false;

  if (wasCharged) {
    // Charged fire - powerful upward shot with piercing
    const power = 0.5 + game.chargeLevel * 0.5;
    const speed = 350 + power * 300;
    const angle = rand(-0.25, 0.25); // slight random spread
    b.vx = Math.sin(angle) * speed * 0.3;
    b.vy = -speed;
    b.piercing = Math.ceil(game.chargeLevel * game.maxPiercing);
    game.piercingHits = b.piercing;
    sfx.fire();
    emitParticles(b.x, b.y, '#00ffff', 12, 120, 0.5);
  } else {
    // Normal release
    b.vy = -280;
    b.vx = rand(-60, 60);
    sfx.bounce();
  }
  game.isCharging = false;
  game.chargeLevel = 0;
}

function fireCharged() {
  releaseBall(true);
  game.isCharging = false;
  game.chargeLevel = 0;
}

// ─── Render ───
function render(time) {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  ctx.save();
  ctx.translate(ox, oy);
  ctx.scale(scale, scale);

  // ── Background ──
  const bgGrad = ctx.createLinearGradient(0, 0, 0, H);
  bgGrad.addColorStop(0, '#05051a');
  bgGrad.addColorStop(0.4, '#0a0a2e');
  bgGrad.addColorStop(0.7, '#0f0a2a');
  bgGrad.addColorStop(1, '#1a0a2e');
  ctx.fillStyle = bgGrad;
  ctx.fillRect(0, 0, W, H);

  // Nebula
  for (const n of nebulae) n.draw(ctx, time);

  // Galaxy
  drawGalaxy(ctx, time);

  // Twinkling stars
  for (const s of bgStars) {
    const alpha = s.getAlpha(time);
    ctx.globalAlpha = alpha;
    ctx.fillStyle = `hsl(${s.hue}, 50%, 80%)`;
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.size, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;

  // ── Stars (game objects) ──
  for (const s of game.stars) {
    const pulse = 0.85 + 0.15 * Math.sin(time * s.pulseSpeed + s.pulse);
    const outerR = s.outerR * pulse;
    const innerR = s.innerR * pulse;

    // Glow
    const glowR = s.glowSize * (0.8 + 0.2 * Math.sin(time * s.pulseSpeed + s.pulse));
    const glow = ctx.createRadialGradient(s.x, s.y, 0, s.x, s.y, glowR);
    glow.addColorStop(0, 'rgba(255, 215, 0, 0.25)');
    glow.addColorStop(0.4, 'rgba(255, 200, 50, 0.12)');
    glow.addColorStop(1, 'rgba(255, 200, 50, 0)');
    ctx.fillStyle = glow;
    ctx.beginPath();
    ctx.arc(s.x, s.y, glowR, 0, Math.PI * 2);
    ctx.fill();

    // Star shape
    drawStarShape(ctx, s.x, s.y, outerR, innerR, time * 0.3 + s.pulse);
    const starGrad = ctx.createRadialGradient(s.x - 4, s.y - 4, 0, s.x, s.y, outerR);
    starGrad.addColorStop(0, '#fff8dc');
    starGrad.addColorStop(0.5, '#ffd700');
    starGrad.addColorStop(1, '#ffa500');
    ctx.fillStyle = starGrad;
    ctx.fill();

    // Star outline glow
    ctx.strokeStyle = `rgba(255, 215, 0, ${0.3 * pulse})`;
    ctx.lineWidth = 1.5;
    ctx.stroke();
  }

  // ── Fragments ──
  for (const f of game.fragments) {
    const alpha = clamp(f.life / f.maxLife, 0, 1);
    ctx.globalAlpha = alpha;
    ctx.fillStyle = f.color;
    // Diamond shape
    ctx.beginPath();
    ctx.moveTo(f.x, f.y - f.r);
    ctx.lineTo(f.x + f.r, f.y);
    ctx.lineTo(f.x, f.y + f.r);
    ctx.lineTo(f.x - f.r, f.y);
    ctx.closePath();
    ctx.fill();
    // Glow
    ctx.shadowColor = f.color;
    ctx.shadowBlur = 4;
    ctx.fill();
    ctx.shadowBlur = 0;
  }
  ctx.globalAlpha = 1;

  // ── Particles ──
  for (const p of particles) p.draw(ctx);

  // ── Ball ──
  if (game.ball) {
    const b = game.ball;

    // Trail
    for (let i = 0; i < b.trail.length; i++) {
      const t = b.trail[i];
      const alpha = (i / b.trail.length) * 0.6;
      const size = b.r * (0.2 + 0.8 * (i / b.trail.length));
      let color;
      if (b.piercing > 0) {
        color = `rgba(0, 200, 255, ${alpha})`;
      } else {
        color = `rgba(100, 200, 255, ${alpha})`;
      }
      ctx.fillStyle = color;
      ctx.beginPath();
      ctx.arc(t.x, t.y, size, 0, Math.PI * 2);
      ctx.fill();
    }

    // Ball glow
    let glowColor, ballColor, ballSize = b.r;
    if (b.stuck && game.isCharging) {
      const c = game.chargeLevel;
      const r = Math.floor(lerp(60, 255, c));
      const g = Math.floor(lerp(200, 100, c));
      const bl = Math.floor(lerp(255, 50, c));
      glowColor = `rgba(${r}, ${g}, ${bl}, ${0.3 + c * 0.3})`;
      ballColor = `rgb(${r}, ${g}, ${bl})`;
      ballSize = b.r + c * 3;
    } else if (b.piercing > 0) {
      glowColor = 'rgba(0, 200, 255, 0.35)';
      ballColor = '#00ddff';
    } else {
      glowColor = 'rgba(100, 200, 255, 0.25)';
      ballColor = '#88ccff';
    }

    const glowR = ballSize * 2.5;
    const gGrad = ctx.createRadialGradient(b.x, b.y, 0, b.x, b.y, glowR);
    gGrad.addColorStop(0, glowColor);
    gGrad.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = gGrad;
    ctx.beginPath();
    ctx.arc(b.x, b.y, glowR, 0, Math.PI * 2);
    ctx.fill();

    // Ball body
    const ballGrad = ctx.createRadialGradient(b.x - 3, b.y - 3, 0, b.x, b.y, ballSize);
    ballGrad.addColorStop(0, '#ffffff');
    ballGrad.addColorStop(0.3, ballColor);
    ballGrad.addColorStop(1, ballColor);
    ctx.fillStyle = ballGrad;
    ctx.beginPath();
    ctx.arc(b.x, b.y, ballSize, 0, Math.PI * 2);
    ctx.fill();
  }

  // ── Paddle ──
  const pad = game.paddle;
  let padColor1, padColor2, padAlpha, padGlowR, padGlowColor;

  if (game.ballStuck && game.isCharging) {
    const c = game.chargeLevel;
    const r1 = Math.floor(lerp(40, 255, c));
    const g1 = Math.floor(lerp(180, 80, c));
    const b1 = Math.floor(lerp(255, 30, c));
    padColor1 = `rgba(${r1}, ${g1}, ${b1}, 0.8)`;
    padColor2 = `rgba(${Math.floor(r1*0.6)}, ${Math.floor(g1*0.3)}, ${Math.floor(b1*0.2)}, 0.4)`;
    padAlpha = 0.7 + c * 0.3;
    padGlowR = 50 + c * 40;
    padGlowColor = `rgba(${r1}, ${g1}, ${b1}, ${0.15 + c * 0.25})`;
  } else {
    padColor1 = 'rgba(60, 180, 255, 0.7)';
    padColor2 = 'rgba(30, 100, 200, 0.35)';
    padAlpha = 0.65;
    padGlowR = 35;
    padGlowColor = 'rgba(60, 180, 255, 0.12)';
  }

  // Paddle glow
  const pGlow = ctx.createRadialGradient(
    pad.x + pad.w / 2, pad.y + pad.h / 2, 0,
    pad.x + pad.w / 2, pad.y + pad.h / 2, padGlowR + pad.w / 2
  );
  pGlow.addColorStop(0, padGlowColor);
  pGlow.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = pGlow;
  ctx.fillRect(pad.x - padGlowR, pad.y - padGlowR, pad.w + padGlowR * 2, pad.h + padGlowR * 2);

  // Paddle body (rounded rect)
  const px = pad.x, py = pad.y, pw = pad.w, ph = pad.h, pr = PADDLE_R;
  ctx.beginPath();
  ctx.moveTo(px + pr, py);
  ctx.lineTo(px + pw - pr, py);
  ctx.quadraticCurveTo(px + pw, py, px + pw, py + pr);
  ctx.lineTo(px + pw, py + ph - pr);
  ctx.quadraticCurveTo(px + pw, py + ph, px + pw - pr, py + ph);
  ctx.lineTo(px + pr, py + ph);
  ctx.quadraticCurveTo(px, py + ph, px, py + ph - pr);
  ctx.lineTo(px, py + pr);
  ctx.quadraticCurveTo(px, py, px + pr, py);
  ctx.closePath();

  const pGrad = ctx.createLinearGradient(px, py, px, py + ph);
  pGrad.addColorStop(0, padColor1);
  pGrad.addColorStop(0.5, `rgba(100, 200, 255, ${padAlpha * 0.5})`);
  pGrad.addColorStop(1, padColor2);
  ctx.fillStyle = pGrad;
  ctx.fill();
  ctx.strokeStyle = `rgba(150, 220, 255, ${padAlpha * 0.4})`;
  ctx.lineWidth = 1.5;
  ctx.stroke();

  // Magnetic zone indicators (subtle)
  const mzw = pad.w * MAGNETIC_ZONE_RATIO;
  ctx.fillStyle = `rgba(100, 200, 255, 0.06)`;
  ctx.fillRect(px, py, mzw, ph);
  ctx.fillRect(px + pw - mzw, py, mzw, ph);

  // ── HUD ──
  drawHUD(time);

  // ── Screens ──
  if (game.state === 'menu') drawMenu(time);
  if (game.state === 'gameover') drawGameOver(time);
  if (game.state === 'won') drawWin(time);

  ctx.restore();
}

// ─── HUD ───
function drawHUD(time) {
  // Score
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 22px "Segoe UI", sans-serif';
  ctx.textAlign = 'left';
  ctx.textBaseline = 'top';
  ctx.shadowColor = 'rgba(0,0,0,0.5)';
  ctx.shadowBlur = 4;

  ctx.fillStyle = '#ffe66d';
  ctx.fillText('⭐ ' + game.score, 16, 14);

  // Lives
  ctx.fillStyle = '#ff6b9d';
  ctx.textAlign = 'right';
  let livesStr = '';
  for (let i = 0; i < game.lives; i++) livesStr += '◆ ';
  ctx.fillText(livesStr, W - 16, 14);

  // Timer
  ctx.textAlign = 'right';
  ctx.fillStyle = game.timeLeft < 15 ? '#ff4444' : '#88ddff';
  ctx.font = 'bold 20px "Segoe UI", sans-serif';
  const secs = Math.ceil(game.timeLeft);
  ctx.fillText(Math.floor(secs / 60) + ':' + String(secs % 60).padStart(2, '0'), W - 16, 42);

  // Piercing indicator
  if (game.ball && game.ball.piercing > 0) {
    ctx.textAlign = 'left';
    ctx.fillStyle = '#00ddff';
    ctx.font = 'bold 18px "Segoe UI", sans-serif';
    ctx.fillText(`⚡ x${game.ball.piercing}`, 16, 44);
  }

  // Charge indicator
  if (game.isCharging) {
    const ch = 6;
    const cw = 100;
    const cx = (W - cw) / 2;
    const cy = H - 62;
    ctx.fillStyle = 'rgba(0,0,0,0.4)';
    ctx.fillRect(cx, cy, cw, ch);
    const grad = ctx.createLinearGradient(cx, cy, cx + cw, cy);
    grad.addColorStop(0, '#44ddff');
    grad.addColorStop(0.5, '#ffcc00');
    grad.addColorStop(1, '#ff4444');
    ctx.fillStyle = grad;
    ctx.fillRect(cx + 1, cy + 1, (cw - 2) * game.chargeLevel, ch - 2);
    ctx.fillStyle = '#fff';
    ctx.font = '11px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('蓄力 ' + Math.floor(game.chargeLevel * 100) + '%', W / 2, cy - 4);
  }

  // Combo display
  if (game.comboCount > 1) {
    ctx.fillStyle = '#ffe66d';
    ctx.font = 'bold 24px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(`${game.comboCount}连击!`, W / 2, 14);
  }

  ctx.shadowBlur = 0;
}

// ─── Menu Screen ───
function drawMenu(time) {
  ctx.fillStyle = 'rgba(0,0,0,0.45)';
  ctx.fillRect(0, 0, W, H);

  // Title glow
  const tGlow = ctx.createRadialGradient(W / 2, 180, 10, W / 2, 180, 200);
  tGlow.addColorStop(0, 'rgba(100, 200, 255, 0.10)');
  tGlow.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = tGlow;
  ctx.fillRect(0, 0, W, 360);

  // Title
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.shadowColor = 'rgba(100, 200, 255, 0.5)';
  ctx.shadowBlur = 20;

  ctx.fillStyle = '#fff';
  ctx.font = 'bold 52px "Segoe UI", "PingFang SC", sans-serif';
  ctx.fillText('星轨弹球大作战', W / 2, 160);

  ctx.shadowBlur = 10;
  ctx.fillStyle = '#88ddff';
  ctx.font = '20px "Segoe UI", "PingFang SC", sans-serif';
  ctx.fillText('Star Rail Pinball Battle', W / 2, 208);

  ctx.shadowBlur = 0;

  // Instructions
  ctx.fillStyle = 'rgba(255,255,255,0.7)';
  ctx.font = '16px "Segoe UI", "PingFang SC", sans-serif';
  ctx.fillText('🖱 鼠标移动控制挡板 · 左键点击蓄力发射', W / 2, 290);
  ctx.fillText('📱 手指滑动控制挡板 · 双击蓄力发射', W / 2, 316);

  ctx.fillStyle = '#ffe66d';
  ctx.font = 'bold 24px "Segoe UI", sans-serif';
  const blink = 0.6 + 0.4 * Math.sin(time * 3);
  ctx.globalAlpha = blink;
  ctx.fillText('— 点击 / 触摸任意位置开始 —', W / 2, 390);
  ctx.globalAlpha = 1;

  // Goals
  ctx.fillStyle = 'rgba(255,255,255,0.5)';
  ctx.font = '15px "Segoe UI", "PingFang SC", sans-serif';
  ctx.fillText('🎯 在 90 秒内获得 100 分 · 光球掉落 3 次即失败', W / 2, 450);
  ctx.fillText('⭐ 击中星星 +10 · 接住碎片 +5 · 蓄力可击穿星星', W / 2, 474);

  // Decorative floating stars
  for (let i = 0; i < 6; i++) {
    const sx = 100 + i * 120 + Math.sin(time + i) * 15;
    const sy = 510 + Math.sin(time * 1.5 + i * 1.2) * 8;
    const s = 6 + Math.sin(time * 2 + i) * 2;
    ctx.globalAlpha = 0.3 + 0.3 * Math.sin(time * 1.5 + i);
    drawStarShape(ctx, sx, sy, s, s * 0.4, time * 0.5 + i);
    ctx.fillStyle = '#ffe66d';
    ctx.fill();
    ctx.globalAlpha = 1;
  }
}

// ─── Game Over Screen ───
function drawGameOver(time) {
  ctx.fillStyle = 'rgba(0,0,0,0.65)';
  ctx.fillRect(0, 0, W, H);

  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';

  ctx.shadowColor = 'rgba(255, 50, 50, 0.4)';
  ctx.shadowBlur = 15;
  ctx.fillStyle = '#ff4444';
  ctx.font = 'bold 46px "Segoe UI", "PingFang SC", sans-serif';
  ctx.fillText('游戏失败', W / 2, H / 2 - 60);
  ctx.shadowBlur = 0;

  ctx.fillStyle = '#fff';
  ctx.font = '22px "Segoe UI", sans-serif';
  ctx.fillText('得分: ' + game.score + ' / ' + WIN_SCORE, W / 2, H / 2);

  if (game.lives <= 0) {
    ctx.fillStyle = '#ff6b9d';
    ctx.fillText('光球已全部掉落!', W / 2, H / 2 + 40);
  } else {
    ctx.fillStyle = '#88ddff';
    ctx.fillText('时间到! 分数不足 ' + WIN_SCORE + ' 分', W / 2, H / 2 + 40);
  }

  const blink = 0.5 + 0.5 * Math.sin(time * 2.5);
  ctx.globalAlpha = blink;
  ctx.fillStyle = '#ffe66d';
  ctx.font = '20px "Segoe UI", "PingFang SC", sans-serif';
  ctx.fillText('点击重新开始', W / 2, H / 2 + 100);
  ctx.globalAlpha = 1;
}

// ─── Win Screen ───
function drawWin(time) {
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  ctx.fillRect(0, 0, W, H);

  // Celebration particles
  if (Math.random() < 0.3) {
    emitParticles(
      rand(0, W), -10,
      ['#ffd700', '#ff6b6b', '#48dbfb', '#ffe66d', '#ff9ff3'][randInt(0, 4)],
      3, rand(100, 200), rand(1, 2.5)
    );
  }

  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';

  ctx.shadowColor = 'rgba(255, 215, 0, 0.6)';
  ctx.shadowBlur = 25;
  ctx.fillStyle = '#ffd700';
  ctx.font = 'bold 52px "Segoe UI", "PingFang SC", sans-serif';
  ctx.fillText('✨ 胜利! ✨', W / 2, H / 2 - 70);
  ctx.shadowBlur = 0;

  ctx.fillStyle = '#fff';
  ctx.font = '24px "Segoe UI", sans-serif';
  ctx.fillText('得分: ' + game.score + ' 分', W / 2, H / 2);

  ctx.fillStyle = '#88ddff';
  ctx.font = '18px "Segoe UI", "PingFang SC", sans-serif';
  ctx.fillText('成功在 90 秒内获得 ' + WIN_SCORE + ' 分!', W / 2, H / 2 + 40);

  const blink = 0.5 + 0.5 * Math.sin(time * 2.5);
  ctx.globalAlpha = blink;
  ctx.fillStyle = '#ffe66d';
  ctx.font = '20px "Segoe UI", "PingFang SC", sans-serif';
  ctx.fillText('点击再来一局', W / 2, H / 2 + 100);
  ctx.globalAlpha = 1;
}

// ─── Game Loop ───
let lastTime = 0;

function loop(timestamp) {
  const dt = Math.min((timestamp - lastTime) / 1000, 0.05);
  lastTime = timestamp;

  // Handle menu/end screen clicks
  if (game.state === 'menu') {
    if (input.clickJustDown) {
      game.startGame();
    }
    // Animate particles on menu too
    if (Math.random() < 0.1) {
      emitParticles(rand(0, W), rand(0, H), 'rgba(100, 200, 255, 0.3)', 1, 15, 0.8);
    }
  }
  if ((game.state === 'gameover' || game.state === 'won') && input.clickJustDown) {
    game.startGame();
  }

  update(dt);
  render(timestamp / 1000);

  input.update();
  requestAnimationFrame(loop);
}

// ─── Start ───
game.reset();
requestAnimationFrame(loop);
</script>
</body>
</html>
