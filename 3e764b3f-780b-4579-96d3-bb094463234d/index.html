<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Simple Platformer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #1a1a2e;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100dvh;
            font-family: 'Courier New', monospace;
            touch-action: none;
            user-select: none;
            -webkit-user-select: none;
        }
        canvas {
            display: block;
            background: #16213e;
            border: 2px solid #0f3460;
            image-rendering: pixelated;
            max-width: 100vw;
            max-height: 100dvh;
            touch-action: none;
        }
        #ui {
            position: absolute;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            color: #e94560;
            font-size: 22px;
            font-weight: bold;
            text-shadow: 2px 2px 0 #0f3460;
            pointer-events: none;
            display: flex;
            gap: 30px;
            white-space: nowrap;
        }
        #ui span {
            background: rgba(15, 52, 96, 0.7);
            padding: 4px 14px;
            border-radius: 20px;
            border: 1px solid #e94560;
        }
        #restartBtn {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #e94560;
            color: #fff;
            border: none;
            padding: 10px 30px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            font-family: 'Courier New', monospace;
            box-shadow: 0 4px 0 #0f3460;
            transition: 0.05s linear;
            touch-action: manipulation;
            border: 2px solid #0f3460;
            letter-spacing: 1px;
        }
        #restartBtn:active {
            transform: translateX(-50%) translateY(4px);
            box-shadow: 0 0px 0 #0f3460;
        }
        #restartBtn:focus-visible {
            outline: 2px solid #fff;
        }
        #mobileControls {
            position: absolute;
            bottom: 100px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: space-between;
            padding: 0 20px;
            pointer-events: none;
            max-width: 600px;
            margin: 0 auto;
        }
        .touch-btn {
            pointer-events: auto;
            background: rgba(233, 69, 96, 0.25);
            border: 2px solid rgba(233, 69, 96, 0.6);
            color: #fff;
            font-size: 32px;
            font-weight: bold;
            padding: 16px 28px;
            border-radius: 60px;
            touch-action: manipulation;
            min-width: 80px;
            text-align: center;
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
        }
        .touch-btn:active {
            background: rgba(233, 69, 96, 0.5);
        }
        @media (hover: hover) and (pointer: fine) {
            #mobileControls {
                display: none;
            }
        }
        @media (max-width: 500px) {
            #ui {
                font-size: 16px;
                gap: 14px;
                top: 8px;
            }
            #ui span {
                padding: 2px 10px;
            }
            #restartBtn {
                padding: 8px 20px;
                font-size: 15px;
                bottom: 16px;
            }
            .touch-btn {
                padding: 12px 18px;
                font-size: 26px;
                min-width: 60px;
            }
        }
    </style>
</head>
<body>

    <div id="ui">
        <span>🏆 <span id="scoreDisplay">0</span></span>
        <span>📦 <span id="coinDisplay">0</span></span>
    </div>

    <canvas id="gameCanvas"></canvas>

    <button id="restartBtn">⟳ RESTART</button>

    <div id="mobileControls">
        <button class="touch-btn" id="leftBtn">◀</button>
        <button class="touch-btn" id="jumpBtn">▲</button>
        <button class="touch-btn" id="rightBtn">▶</button>
    </div>

    <script>
        (function() {
            const canvas = document.getElementById('gameCanvas');
            const ctx = canvas.getContext('2d');
            const scoreSpan = document.getElementById('scoreDisplay');
            const coinSpan = document.getElementById('coinDisplay');
            const restartBtn = document.getElementById('restartBtn');

            // --- SIZING ---
            const W = 600;
            const H = 400;
            canvas.width = W;
            canvas.height = H;

            // --- GAME STATE ---
            let gameOver = false;
            let score = 0;
            let coinsCollected = 0;
            let frame = 0;

            // --- PLAYER ---
            const player = {
                x: 50,
                y: 300,
                w: 20,
                h: 24,
                vx: 0,
                vy: 0,
                onGround: false,
                jumps: 0,
                maxJumps: 2,
                facing: 1
            };

            // --- PHYSICS ---
            const GRAVITY = 0.55;
            const FRICTION = 0.82;
            const MOVE_SPEED = 3.8;
            const JUMP_FORCE = -8.2;
            const MAX_FALL = 12;

            // --- LEVEL ---
            let platforms = [];
            let coins = [];
            let particles = [];
            let cameraX = 0;

            function buildLevel() {
                platforms = [
                    // ground
                    { x: 0, y: 370, w: 600, h: 30 },
                    // floating platforms
                    { x: 80, y: 290, w: 80, h: 12 },
                    { x: 200, y: 230, w: 80, h: 12 },
                    { x: 340, y: 180, w: 80, h: 12 },
                    { x: 470, y: 230, w: 80, h: 12 },
                    { x: 560, y: 290, w: 80, h: 12 },
                    { x: 140, y: 140, w: 70, h: 12 },
                    { x: 320, y: 100, w: 70, h: 12 },
                    { x: 490, y: 140, w: 70, h: 12 },
                    // high challenge
                    { x: 40, y: 200, w: 60, h: 12 },
                    { x: 410, y: 290, w: 60, h: 12 },
                ];

                coins = [];
                // place coins on/near platforms
                const coinPositions = [
                    { x: 110, y: 275 },
                    { x: 230, y: 215 },
                    { x: 370, y: 165 },
                    { x: 500, y: 215 },
                    { x: 590, y: 275 },
                    { x: 170, y: 125 },
                    { x: 350, y: 85 },
                    { x: 520, y: 125 },
                    { x: 65, y: 185 },
                    { x: 440, y: 275 },
                    { x: 280, y: 330 },
                ];
                for (const p of coinPositions) {
                    coins.push({ x: p.x, y: p.y, w: 12, h: 12, collected: false });
                }
            }
            buildLevel();

            // --- PARTICLES ---
            function emitParticles(x, y, count, color) {
                for (let i = 0; i < count; i++) {
                    particles.push({
                        x: x,
                        y: y,
                        vx: (Math.random() - 0.5) * 6,
                        vy: (Math.random() - 0.5) * 6 - 2,
                        life: 30 + Math.random() * 25,
                        maxLife: 55,
                        size: 3 + Math.random() * 4,
                        color: color || '#f0c040'
                    });
                }
            }

            // --- HELPERS ---
            function rectCollide(a, b) {
                return a.x < b.x + b.w && a.x + a.w > b.x &&
                    a.y < b.y + b.h && a.y + a.h > b.y;
            }

            function resetGame() {
                gameOver = false;
                score = 0;
                coinsCollected = 0;
                particles = [];
                frame = 0;
                player.x = 50;
                player.y = 300;
                player.vx = 0;
                player.vy = 0;
                player.onGround = false;
                player.jumps = 0;
                cameraX = 0;
                for (const c of coins) c.collected = false;
                updateDisplay();
            }

            // --- INPUT ---
            const keys = { left: false, right: false, jump: false, jumpPressed: false };
            let jumpConsumed = false;

            document.addEventListener('keydown', (e) => {
                if (gameOver) return;
                if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') keys.left = true;
                if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') keys.right = true;
                if (e.key === ' ' || e.key === 'ArrowUp' || e.key === 'w' || e.key === 'W') {
                    e.preventDefault();
                    if (!keys.jump) {
                        keys.jump = true;
                        keys.jumpPressed = true;
                    }
                }
            });

            document.addEventListener('keyup', (e) => {
                if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') keys.left = false;
                if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') keys.right = false;
                if (e.key === ' ' || e.key === 'ArrowUp' || e.key === 'w' || e.key === 'W') {
                    e.preventDefault();
                    keys.jump = false;
                }
            });

            // --- TOUCH / MOBILE ---
            const touchState = { left: false, right: false, jump: false, jumpPressed: false };

            function setupTouchButton(id, key) {
                const el = document.getElementById(id);
                if (!el) return;
                el.addEventListener('touchstart', (e) => {
                    e.preventDefault();
                    if (gameOver) return;
                    if (key === 'jump') {
                        if (!touchState.jump) {
                            touchState.jump = true;
                            touchState.jumpPressed = true;
                        }
                    } else {
                        touchState[key] = true;
                    }
                }, { passive: false });
                el.addEventListener('touchend', (e) => {
                    e.preventDefault();
                    if (key === 'jump') {
                        touchState.jump = false;
                    } else {
                        touchState[key] = false;
                    }
                }, { passive: false });
                el.addEventListener('touchcancel', (e) => {
                    if (key === 'jump') touchState.jump = false;
                    else touchState[key] = false;
                });
                // mouse fallback for desktop testing
                el.addEventListener('mousedown', (e) => {
                    if (gameOver) return;
                    if (key === 'jump') {
                        if (!touchState.jump) {
                            touchState.jump = true;
                            touchState.jumpPressed = true;
                        }
                    } else {
                        touchState[key] = true;
                    }
                });
                el.addEventListener('mouseup', (e) => {
                    if (key === 'jump') touchState.jump = false;
                    else touchState[key] = false;
                });
                el.addEventListener('mouseleave', (e) => {
                    if (key === 'jump') touchState.jump = false;
                    else touchState[key] = false;
                });
            }

            setupTouchButton('leftBtn', 'left');
            setupTouchButton('rightBtn', 'right');
            setupTouchButton('jumpBtn', 'jump');

            // --- MERGE INPUT ---
            function getInput() {
                const left = keys.left || touchState.left;
                const right = keys.right || touchState.right;
                const jump = keys.jump || touchState.jump;
                const jumpPressed = keys.jumpPressed || touchState.jumpPressed;
                // reset jumpPressed after reading
                if (keys.jumpPressed) keys.jumpPressed = false;
                if (touchState.jumpPressed) touchState.jumpPressed = false;
                return { left, right, jump, jumpPressed };
            }

            // --- UPDATE ---
            function update() {
                if (gameOver) return;

                const input = getInput();
                const jumpPressed = input.jumpPressed;

                // movement
                if (input.left) {
                    player.vx -= MOVE_SPEED * 0.3;
                    player.facing = -1;
                }
                if (input.right) {
                    player.vx += MOVE_SPEED * 0.3;
                    player.facing = 1;
                }

                player.vx *= FRICTION;

                // clamp horizontal speed
                if (Math.abs(player.vx) > MOVE_SPEED) {
                    player.vx = Math.sign(player.vx) * MOVE_SPEED;
                }

                // gravity
                player.vy += GRAVITY;
                if (player.vy > MAX_FALL) player.vy = MAX_FALL;

                // jump
                if (jumpPressed && player.jumps < player.maxJumps) {
                    player.vy = JUMP_FORCE;
                    player.jumps++;
                    player.onGround = false;
                    emitParticles(player.x + player.w / 2, player.y + player.h, 6, '#a0d8ef');
                }

                // horizontal collision
                player.x += player.vx;
                for (const p of platforms) {
                    if (rectCollide(player, p)) {
                        if (player.vx > 0) {
                            player.x = p.x - player.w;
                        } else if (player.vx < 0) {
                            player.x = p.x + p.w;
                        }
                        player.vx = 0;
                    }
                }

                // vertical collision
                player.y += player.vy;
                player.onGround = false;
                for (const p of platforms) {
                    if (rectCollide(player, p)) {
                        if (player.vy > 0) {
                            player.y = p.y - player.h;
                            player.vy = 0;
                            player.onGround = true;
                            player.jumps = 0;
                        } else if (player.vy < 0) {
                            player.y = p.y + p.h;
                            player.vy = 0;
                        }
                    }
                }

                // coin collection
                for (const c of coins) {
                    if (c.collected) continue;
                    const coinRect = { x: c.x, y: c.y, w: c.w, h: c.h };
                    if (rectCollide(player, coinRect)) {
                        c.collected = true;
                        coinsCollected++;
                        score += 10;
                        emitParticles(c.x + c.w / 2, c.y + c.h / 2, 12, '#f0c040');
                        updateDisplay();
                    }
                }

                // fall death
                if (player.y > H + 50) {
                    gameOver = true;
                    emitParticles(player.x + player.w / 2, H, 30, '#e94560');
                    return;
                }

                // camera follow
                const targetCam = player.x - W * 0.3;
                cameraX += (targetCam - cameraX) * 0.08;
                if (cameraX < 0) cameraX = 0;
                const maxCam = 600 - W;
                if (cameraX > maxCam) cameraX = maxCam;

                // particles
                for (let i = particles.length - 1; i >= 0; i--) {
                    const p = particles[i];
                    p.x += p.vx;
                    p.y += p.vy;
                    p.vy += 0.15;
                    p.life--;
                    if (p.life <= 0) {
                        particles.splice(i, 1);
                    }
                }

                frame++;
            }

            // --- DRAW ---
            function draw() {
                ctx.save();
                ctx.clearRect(0, 0, W, H);

                // background gradient
                const grad = ctx.createLinearGradient(0, 0, 0, H);
                grad.addColorStop(0, '#0a0a23');
                grad.addColorStop(0.6, '#1a1a3e');
                grad.addColorStop(1, '#16213e');
                ctx.fillStyle = grad;
                ctx.fillRect(0, 0, W, H);

                // stars
                ctx.fillStyle = 'rgba(255,255,255,0.3)';
                for (let i = 0; i < 40; i++) {
                    const sx = (i * 47 + 13) % W;
                    const sy = (i * 31 + 7) % (H * 0.6);
                    const sz = 1 + (i % 3);
                    ctx.fillRect(sx, sy, sz, sz);
                }

                ctx.translate(-cameraX, 0);

                // --- draw platforms ---
                for (const p of platforms) {
                    const px = p.x,
                        py = p.y,
                        pw = p.w,
                        ph = p.h;
                    // top highlight
                    ctx.fillStyle = '#2a6a8a';
                    ctx.fillRect(px, py, pw, 3);
                    // body
                    ctx.fillStyle = '#1a4a6a';
                    ctx.fillRect(px, py + 3, pw, ph - 3);
                    // border
                    ctx.strokeStyle = '#0f3460';
                    ctx.lineWidth = 1.5;
                    ctx.strokeRect(px, py, pw, ph);
                    // subtle shine
                    ctx.fillStyle = 'rgba(255,255,255,0.08)';
                    ctx.fillRect(px + 4, py + 4, pw - 8, 4);
                }

                // --- draw coins ---
                for (const c of coins) {
                    if (c.collected) continue;
                    const cx = c.x,
                        cy = c.y;
                    const bob = Math.sin(frame * 0.06 + cx * 0.1) * 2;
                    // glow
                    ctx.shadowColor = '#f0c040';
                    ctx.shadowBlur = 12;
                    // coin body
                    ctx.fillStyle = '#f0c040';
                    ctx.beginPath();
                    ctx.ellipse(cx + c.w / 2, cy + c.h / 2 + bob, c.w / 2, c.h / 2, 0, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.shadowBlur = 0;
                    // inner
                    ctx.fillStyle = '#ffd866';
                    ctx.beginPath();
                    ctx.ellipse(cx + c.w / 2, cy + c.h / 2 + bob, c.w / 4, c.h / 4, 0, 0, Math.PI * 2);
                    ctx.fill();
                    // $ symbol
                    ctx.fillStyle = '#b08020';
                    ctx.font = 'bold 9px monospace';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText('$', cx + c.w / 2, cy + c.h / 2 + bob + 0.5);
                }

                // --- draw player ---
                const px = player.x,
                    py = player.y,
                    pw = player.w,
                    ph = player.h;
                // shadow
                ctx.fillStyle = 'rgba(0,0,0,0.3)';
                ctx.fillRect(px + 2, py + ph - 2, pw, 4);

                // body
                const bodyGrad = ctx.createLinearGradient(px, py, px, py + ph);
                bodyGrad.addColorStop(0, '#e94560');
                bodyGrad.addColorStop(1, '#c23152');
                ctx.fillStyle = bodyGrad;
                ctx.fillRect(px, py, pw, ph);
                // head (cap)
                ctx.fillStyle = '#ff6b81';
                ctx.fillRect(px - 2, py - 4, pw + 4, 8);
                // visor
                ctx.fillStyle = '#0f3460';
                ctx.fillRect(px + (player.facing > 0 ? pw - 8 : 0), py + 4, 8, 5);
                // eyes
                ctx.fillStyle = '#fff';
                const eyeX = player.facing > 0 ? px + pw - 7 : px + 3;
                ctx.fillRect(eyeX, py + 4, 4, 4);
                ctx.fillStyle = '#111';
                ctx.fillRect(eyeX + 1, py + 5, 2, 2);
                // belt
                ctx.fillStyle = '#0f3460';
                ctx.fillRect(px, py + ph - 6, pw, 3);
                // boots
                ctx.fillStyle = '#2a1a1a';
                ctx.fillRect(px - 1, py + ph - 2, 5, 4);
                ctx.fillRect(px + pw - 4, py + ph - 2, 5, 4);

                // --- draw particles ---
                for (const p of particles) {
                    const alpha = p.life / p.maxLife;
                    ctx.globalAlpha = alpha;
                    ctx.fillStyle = p.color || '#f0c040';
                    ctx.fillRect(p.x - p.size / 2, p.y - p.size / 2, p.size, p.size);
                }
                ctx.globalAlpha = 1;

                ctx.restore();

                // --- HUD overlay (game over) ---
                if (gameOver) {
                    ctx.fillStyle = 'rgba(0,0,0,0.55)';
                    ctx.fillRect(0, 0, W, H);
                    ctx.fillStyle = '#e94560';
                    ctx.font = 'bold 40px monospace';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.shadowColor = '#0f3460';
                    ctx.shadowBlur = 16;
                    ctx.fillText('GAME OVER', W / 2, H / 2 - 20);
                    ctx.shadowBlur = 0;
                    ctx.fillStyle = '#fff';
                    ctx.font = '18px monospace';
                    ctx.fillText('score: ' + score, W / 2, H / 2 + 40);
                }

                // score on canvas too (backup)
                ctx.fillStyle = 'rgba(255,255,255,0.15)';
                ctx.font = '12px monospace';
                ctx.textAlign = 'left';
                ctx.textBaseline = 'top';
                ctx.fillText('v1.0', 8, 8);
            }

            function updateDisplay() {
                scoreSpan.textContent = score;
                coinSpan.textContent = coinsCollected;
            }

            // --- GAME LOOP ---
            function gameLoop() {
                update();
                draw();
                requestAnimationFrame(gameLoop);
            }

            // --- RESTART ---
            restartBtn.addEventListener('click', () => {
                resetGame();
            });
            restartBtn.addEventListener('touchstart', (e) => {
                e.preventDefault();
                resetGame();
            }, { passive: false });

            // --- RESIZE ---
            function resizeCanvas() {
                const container = canvas.parentElement;
                const maxW = window.innerWidth * 0.92;
                const maxH = window.innerHeight * 0.75;
                const scale = Math.min(maxW / W, maxH / H, 1.8);
                canvas.style.width = (W * scale) + 'px';
                canvas.style.height = (H * scale) + 'px';
            }
            window.addEventListener('resize', resizeCanvas);
            resizeCanvas();

            // --- START ---
            resetGame();
            gameLoop();

            // prevent context menu on long touch
            canvas.addEventListener('contextmenu', (e) => e.preventDefault());
        })();
    </script>
</body>
</html>
