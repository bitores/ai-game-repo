<!DOCTYPE html>
<html lang="zh-CN">
<head>
<!--
  AI Prompt / 提示词:
  一个数字华容道游戏，4x4方格，数字方块可以滑动，空格相邻的方块点击移动，打乱后复原。有计时和步数统计。
-->
<meta name="description" content="一个数字华容道游戏，4x4方格，数字方块可以滑动，空格相邻的方块点击移动，打乱后复原。有计时和步数统计。">

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>数字华容道</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
  overflow: hidden;
  touch-action: none;
  user-select: none;
  -webkit-user-select: none;
}
canvas { display: block; border-radius: 16px; box-shadow: 0 20px 60px rgba(0,0,0,0.5); }
</style>
</head>
<body>
<canvas id="game"></canvas>
<script>
const canvas = document.getElementById('game')
const ctx = canvas.getContext('2d')

const W = 500, H = 600
canvas.width = W
canvas.height = H

// --- CONFIG ---
const GRID_SIZE = 4
const TILE_SIZE = 100
const GAP = 6
const BOARD_SIZE = GRID_SIZE * (TILE_SIZE + GAP) + GAP
const OFFSET_X = (W - BOARD_SIZE) / 2
const BOARD_Y = 110
const TITLE_Y = 44

// --- COLORS ---
const COLORS = {
  bg: '#16213e',
  board: '#0f3460',
  tileGradStart: '#e94560',
  tileGradEnd: '#c23152',
  tileText: '#fff',
  accent: '#4ecca3',
  accentDim: '#3bb88a',
  text: '#e0e0e0',
  textDim: '#8899aa',
  empty: '#1a1a3e',
  overlay: 'rgba(0,0,0,0.75)',
  btnBg: 'rgba(78, 204, 163, 0.15)',
  btnBorder: '#4ecca3',
}

// --- STATE ---
let tiles = []
let emptyIndex = -1
let moves = 0
let gameWon = false
let timer = 0
let gameStarted = false
let timerInterval = null

// --- ANIMATION ---
let animating = false
let animTile = null // { fromRow, fromCol, toRow, toCol, value, progress }

// --- INPUT ---
let isTouching = false
let touchStartX = 0, touchStartY = 0
let isDragging = false

// --- SFX (Web Audio) ---
let audioCtx = null

function getAudioCtx() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)()
  }
  return audioCtx
}

function playMoveSound() {
  try {
    const actx = getAudioCtx()
    const osc = actx.createOscillator()
    const gain = actx.createGain()
    osc.connect(gain)
    gain.connect(actx.destination)
    osc.type = 'sine'
    osc.frequency.setValueAtTime(600, actx.currentTime)
    osc.frequency.exponentialRampToValueAtTime(300, actx.currentTime + 0.08)
    gain.gain.setValueAtTime(0.12, actx.currentTime)
    gain.gain.exponentialRampToValueAtTime(0.001, actx.currentTime + 0.1)
    osc.start(actx.currentTime)
    osc.stop(actx.currentTime + 0.1)
  } catch (e) { /* silent */ }
}

function playWinSound() {
  try {
    const actx = getAudioCtx()
    const notes = [523, 659, 784, 1047]
    notes.forEach((freq, i) => {
      const osc = actx.createOscillator()
      const gain = actx.createGain()
      osc.connect(gain)
      gain.connect(actx.destination)
      osc.type = 'sine'
      osc.frequency.setValueAtTime(freq, actx.currentTime + i * 0.15)
      gain.gain.setValueAtTime(0.12, actx.currentTime + i * 0.15)
      gain.gain.exponentialRampToValueAtTime(0.001, actx.currentTime + i * 0.15 + 0.3)
      osc.start(actx.currentTime + i * 0.15)
      osc.stop(actx.currentTime + i * 0.15 + 0.3)
    })
  } catch (e) { /* silent */ }
}

function initGame() {
  if (timerInterval) {
    clearInterval(timerInterval)
    timerInterval = null
  }

  tiles = []
  for (let i = 1; i < GRID_SIZE * GRID_SIZE; i++) tiles.push(i)
  tiles.push(0)
  shuffle()
  while (!isSolvable() || isSolved()) shuffle()
  emptyIndex = tiles.indexOf(0)
  moves = 0
  timer = 0
  gameWon = false
  gameStarted = false
  animating = false
  animTile = null
}

function shuffle() {
  for (let i = tiles.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [tiles[i], tiles[j]] = [tiles[j], tiles[i]]
  }
}

function isSolvable() {
  let inv = 0
  const arr = tiles.filter(t => t !== 0)
  for (let i = 0; i < arr.length; i++)
    for (let j = i + 1; j < arr.length; j++)
      if (arr[i] > arr[j]) inv++
  const emptyRow = Math.floor(tiles.indexOf(0) / GRID_SIZE)
  if (GRID_SIZE % 2 === 0) return (inv + (GRID_SIZE - 1 - emptyRow)) % 2 === 1
  return inv % 2 === 0
}

function isSolved() {
  for (let i = 0; i < tiles.length - 1; i++)
    if (tiles[i] !== i + 1) return false
  return tiles[tiles.length - 1] === 0
}

function canMove(idx) {
  if (idx < 0 || idx >= tiles.length) return false
  const er = Math.floor(emptyIndex / GRID_SIZE)
  const ec = emptyIndex % GRID_SIZE
  const ir = Math.floor(idx / GRID_SIZE)
  const ic = idx % GRID_SIZE
  return (Math.abs(er - ir) + Math.abs(ec - ic)) === 1
}

function moveTile(idx) {
  if (gameWon || animating || !canMove(idx)) return

  if (!gameStarted) {
    gameStarted = true
    timerInterval = setInterval(() => { if (!gameWon) timer++ }, 1000)
  }

  const fromRow = Math.floor(idx / GRID_SIZE)
  const fromCol = idx % GRID_SIZE
  const toRow = Math.floor(emptyIndex / GRID_SIZE)
  const toCol = emptyIndex % GRID_SIZE
  const value = tiles[idx]

  animTile = { fromRow, fromCol, toRow, toCol, value, progress: 0 }
  animating = true

  tiles[emptyIndex] = tiles[idx]
  tiles[idx] = 0
  emptyIndex = idx
  moves++
  playMoveSound()

  if (isSolved()) {
    gameWon = true
    if (timerInterval) {
      clearInterval(timerInterval)
      timerInterval = null
    }
    playWinSound()
  }
}

function moveByDirection(dr, dc) {
  const er = Math.floor(emptyIndex / GRID_SIZE)
  const ec = emptyIndex % GRID_SIZE
  const tr = er + dr
  const tc = ec + dc
  if (tr < 0 || tr >= GRID_SIZE || tc < 0 || tc >= GRID_SIZE) return
  moveTile(tr * GRID_SIZE + tc)
}

// --- ANIMATION UPDATE ---
function updateAnimation() {
  if (!animating || !animTile) return
  animTile.progress += 0.08
  if (animTile.progress >= 1) {
    animTile.progress = 1
    animating = false
    animTile = null
  }
}

function easeOutCubic(t) {
  return 1 - Math.pow(1 - t, 3)
}

// --- DRAW ---
function draw() {
  ctx.fillStyle = COLORS.bg
  ctx.fillRect(0, 0, W, H)

  // Title
  ctx.fillStyle = COLORS.accent
  ctx.font = 'bold 26px sans-serif'
  ctx.textAlign = 'center'
  ctx.textBaseline = 'middle'
  ctx.fillText('🧩 数字华容道', W / 2, TITLE_Y)

  // Stats bar
  ctx.fillStyle = 'rgba(15, 52, 96, 0.5)'
  ctx.beginPath()
  ctx.roundRect(OFFSET_X - 4, BOARD_Y - 42, BOARD_SIZE + 8, 34, 8)
  ctx.fill()

  ctx.fillStyle = COLORS.text
  ctx.font = '15px sans-serif'
  ctx.textAlign = 'left'
  ctx.textBaseline = 'middle'
  ctx.fillText('🚶 步数: ' + moves, OFFSET_X + 8, BOARD_Y - 25)

  const totalSec = Math.floor(timer)
  const mins = Math.floor(totalSec / 60)
  const secs = totalSec % 60
  const timeStr = mins > 0 ? mins + ':' + secs.toString().padStart(2, '0') : secs + 's'
  ctx.textAlign = 'right'
  ctx.fillText('⏱ 时间: ' + timeStr, OFFSET_X + BOARD_SIZE - 8, BOARD_Y - 25)

  // Restart button
  const btnX = OFFSET_X + BOARD_SIZE - 84
  const btnY = 20
  const btnW = 80
  const btnH = 30
  ctx.fillStyle = COLORS.btnBg
  ctx.strokeStyle = COLORS.btnBorder
  ctx.lineWidth = 1.5
  ctx.beginPath()
  ctx.roundRect(btnX, btnY, btnW, btnH, 6)
  ctx.fill()
  ctx.stroke()
  ctx.fillStyle = COLORS.accent
  ctx.font = '13px sans-serif'
  ctx.textAlign = 'center'
  ctx.textBaseline = 'middle'
  ctx.fillText('🔄 重开', btnX + btnW / 2, btnY + btnH / 2)

  // Board background
  ctx.fillStyle = COLORS.board
  ctx.beginPath()
  ctx.roundRect(OFFSET_X - 4, BOARD_Y - 4, BOARD_SIZE + 8, BOARD_SIZE + 8, 10)
  ctx.fill()

  // --- Draw tiles ---
  for (let i = 0; i < tiles.length; i++) {
    const row = Math.floor(i / GRID_SIZE)
    const col = i % GRID_SIZE
    const x = OFFSET_X + col * (TILE_SIZE + GAP)
    const y = BOARD_Y + row * (TILE_SIZE + GAP)

    if (tiles[i] === 0) {
      // Skip drawing empty at the animating tile's source
      if (animating && animTile && animTile.fromRow === row && animTile.fromCol === col) {
        continue
      }
      ctx.fillStyle = COLORS.empty
      ctx.beginPath()
      ctx.roundRect(x, y, TILE_SIZE, TILE_SIZE, 8)
      ctx.fill()
      continue
    }

    // Skip destination position — will draw animated tile overlay instead
    if (animating && animTile && animTile.toRow === row && animTile.toCol === col) {
      continue
    }

    drawTile(x, y, tiles[i], false)
  }

  // Draw animating tile sliding on top
  if (animating && animTile) {
    const t = easeOutCubic(animTile.progress)
    const drawRow = animTile.fromRow + (animTile.toRow - animTile.fromRow) * t
    const drawCol = animTile.fromCol + (animTile.toCol - animTile.fromCol) * t
    const x = OFFSET_X + drawCol * (TILE_SIZE + GAP)
    const y = BOARD_Y + drawRow * (TILE_SIZE + GAP)
    drawTile(x, y, animTile.value, true)
  }

  // Hint text
  ctx.fillStyle = COLORS.textDim
  ctx.font = '13px sans-serif'
  ctx.textAlign = 'center'
  ctx.textBaseline = 'top'
  const hint = '点击空格相邻的数字方块移动 · 方向键也可操作'
  ctx.fillText(hint, W / 2, BOARD_Y + BOARD_SIZE + 14)

  // --- Win overlay ---
  if (gameWon) {
    ctx.fillStyle = COLORS.overlay
    ctx.fillRect(0, 0, W, H)

    const cardW = 320, cardH = 200
    const cardX = (W - cardW) / 2, cardY = (H - cardH) / 2
    ctx.fillStyle = '#1a1a3e'
    ctx.strokeStyle = COLORS.accent
    ctx.lineWidth = 2
    ctx.beginPath()
    ctx.roundRect(cardX, cardY, cardW, cardH, 16)
    ctx.fill()
    ctx.stroke()

    ctx.fillStyle = COLORS.accent
    ctx.font = 'bold 36px sans-serif'
    ctx.textAlign = 'center'
    ctx.textBaseline = 'middle'
    ctx.fillText('🎉 恭喜完成！', W / 2, cardY + 55)

    ctx.fillStyle = COLORS.text
    ctx.font = '20px sans-serif'
    ctx.fillText('🚶 步数: ' + moves + '    ⏱ 时间: ' + timeStr, W / 2, cardY + 105)

    const playBtnW = 160, playBtnH = 44
    const playBtnX = (W - playBtnW) / 2
    const playBtnY = cardY + 135
    ctx.fillStyle = COLORS.accent
    ctx.beginPath()
    ctx.roundRect(playBtnX, playBtnY, playBtnW, playBtnH, 8)
    ctx.fill()
    ctx.fillStyle = '#1a1a2e'
    ctx.font = 'bold 16px sans-serif'
    ctx.fillText('再来一局', W / 2, playBtnY + playBtnH / 2)
  }
}

function drawTile(x, y, value, isAnimating) {
  ctx.save()
  ctx.shadowColor = 'rgba(0,0,0,0.3)'
  ctx.shadowBlur = isAnimating ? 12 : 6
  ctx.shadowOffsetY = isAnimating ? 4 : 2

  const grad = ctx.createLinearGradient(x, y, x + TILE_SIZE, y + TILE_SIZE)
  grad.addColorStop(0, COLORS.tileGradStart)
  grad.addColorStop(1, COLORS.tileGradEnd)
  ctx.fillStyle = grad
  ctx.beginPath()
  ctx.roundRect(x, y, TILE_SIZE, TILE_SIZE, 8)
  ctx.fill()
  ctx.restore()

  ctx.fillStyle = COLORS.tileText
  ctx.font = 'bold 36px sans-serif'
  ctx.textAlign = 'center'
  ctx.textBaseline = 'middle'
  ctx.fillText(value.toString(), x + TILE_SIZE / 2, y + TILE_SIZE / 2)
}

// --- INPUT ---
function isOnRestartBtn(mx, my) {
  const btnX = OFFSET_X + BOARD_SIZE - 84
  const btnY = 20
  const btnW = 80
  const btnH = 30
  return mx >= btnX && mx <= btnX + btnW && my >= btnY && my <= btnY + btnH
}

function isOnPlayAgain(mx, my) {
  if (!gameWon) return false
  const cardW = 320, cardH = 200
  const cardX = (W - cardW) / 2, cardY = (H - cardH) / 2
  const btnW = 160, btnH = 44
  const btnX = (W - btnW) / 2
  const btnY = cardY + 135
  return mx >= btnX && mx <= btnX + btnW && my >= btnY && my <= btnY + btnH
}

function handleClick(mx, my) {
  if (isOnPlayAgain(mx, my)) { initGame(); return }
  if (isOnRestartBtn(mx, my)) { initGame(); return }
  if (gameWon) return

  if (my < BOARD_Y || my > BOARD_Y + BOARD_SIZE) return
  if (mx < OFFSET_X || mx > OFFSET_X + BOARD_SIZE) return

  const col = Math.floor((mx - OFFSET_X) / (TILE_SIZE + GAP))
  const row = Math.floor((my - BOARD_Y) / (TILE_SIZE + GAP))
  if (col >= GRID_SIZE || row >= GRID_SIZE) return
  moveTile(row * GRID_SIZE + col)
}

// Mouse
canvas.addEventListener('click', e => {
  const rect = canvas.getBoundingClientRect()
  const scaleX = canvas.width / rect.width
  const scaleY = canvas.height / rect.height
  handleClick((e.clientX - rect.left) * scaleX, (e.clientY - rect.top) * scaleY)
})

// Touch
canvas.addEventListener('touchstart', e => {
  e.preventDefault()
  const t = e.touches[0]
  touchStartX = t.clientX
  touchStartY = t.clientY
  isTouching = true
  isDragging = false
})

canvas.addEventListener('touchmove', e => {
  e.preventDefault()
  if (!isTouching) return
  const t = e.touches[0]
  if (Math.abs(t.clientX - touchStartX) > 10 || Math.abs(t.clientY - touchStartY) > 10) {
    isDragging = true
  }
})

canvas.addEventListener('touchend', e => {
  e.preventDefault()
  if (!isTouching) return
  isTouching = false

  const t = e.changedTouches[0]
  const endX = t.clientX
  const endY = t.clientY
  const rect = canvas.getBoundingClientRect()
  const scaleX = canvas.width / rect.width
  const scaleY = canvas.height / rect.height

  if (isDragging) {
    const dx = endX - touchStartX
    const dy = endY - touchStartY
    const absDx = Math.abs(dx)
    const absDy = Math.abs(dy)

    if (Math.max(absDx, absDy) > 30) {
      if (absDx > absDy) {
        moveByDirection(0, dx > 0 ? -1 : 1)
      } else {
        moveByDirection(dy > 0 ? -1 : 1, 0)
      }
    }
    return
  }

  const mx = (touchStartX - rect.left) * scaleX
  const my = (touchStartY - rect.top) * scaleY
  handleClick(mx, my)
})

// Keyboard
document.addEventListener('keydown', e => {
  if (e.key === 'r' || e.key === 'R') { initGame(); return }
  if (gameWon) return

  switch (e.key) {
    case 'ArrowUp': moveByDirection(-1, 0); break
    case 'ArrowDown': moveByDirection(1, 0); break
    case 'ArrowLeft': moveByDirection(0, -1); break
    case 'ArrowRight': moveByDirection(0, 1); break
  }
})

// --- GAME LOOP ---
function gameLoop() {
  updateAnimation()
  draw()
  requestAnimationFrame(gameLoop)
}

initGame()
gameLoop()

// Responsive
function resize() {
  const maxW = Math.min(window.innerWidth * 0.92, 500)
  const maxH = Math.min(window.innerHeight * 0.92, 600)
  const s = Math.min(maxW / W, maxH / H)
  canvas.style.width = Math.floor(W * s) + 'px'
  canvas.style.height = Math.floor(H * s) + 'px'
}
window.addEventListener('resize', resize)
resize()
</script>
</body>
</html>
