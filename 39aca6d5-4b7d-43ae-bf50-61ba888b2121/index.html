<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>3D 宝石收集</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            overflow: hidden;
            background: #000;
            font-family: 'Segoe UI', sans-serif;
            touch-action: none;
        }
        canvas {
            display: block;
        }
        #ui {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            pointer-events: none;
            padding: 18px 22px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }
        #score {
            color: #fff;
            font-size: 20px;
            font-weight: 600;
            text-shadow: 0 2px 12px rgba(0, 0, 0, 0.9);
            background: rgba(0, 0, 0, 0.35);
            padding: 6px 16px;
            border-radius: 20px;
            backdrop-filter: blur(4px);
        }
        #hp {
            color: #ff6b6b;
            font-size: 20px;
            text-shadow: 0 2px 12px rgba(0, 0, 0, 0.9);
            background: rgba(0, 0, 0, 0.35);
            padding: 6px 16px;
            border-radius: 20px;
            backdrop-filter: blur(4px);
        }
        #msg {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #fff;
            font-size: 38px;
            font-weight: 700;
            text-align: center;
            text-shadow: 0 4px 30px rgba(0, 0, 0, 0.95);
            pointer-events: none;
            display: none;
            background: rgba(0, 0, 0, 0.5);
            padding: 28px 48px;
            border-radius: 24px;
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            line-height: 1.6;
        }
        #msg small {
            display: block;
            font-size: 17px;
            font-weight: 400;
            color: #b0b0c8;
            margin-top: 10px;
        }
        #controls-hint {
            position: absolute;
            bottom: 28px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.25);
            font-size: 13px;
            pointer-events: none;
            text-shadow: 0 2px 8px rgba(0, 0, 0, 0.8);
            letter-spacing: 0.5px;
        }
        @media (max-width: 600px) {
            #ui {
                padding: 12px 14px;
            }
            #score,
            #hp {
                font-size: 15px;
                padding: 4px 12px;
            }
            #msg {
                font-size: 26px;
                padding: 20px 28px;
                width: 85%;
            }
            #msg small {
                font-size: 14px;
            }
            #controls-hint {
                font-size: 11px;
                bottom: 18px;
            }
        }
    </style>
</head>
<body>
    <div id="ui">
        <span id="score">💎 0</span>
        <span id="hp">❤️❤️❤️</span>
    </div>
    <div id="msg"></div>
    <div id="controls-hint">← ↑ → ↓ 或 WASD 移动 · 触屏滑动</div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three'

        // --- SCENE ---
        const scene = new THREE.Scene()
        scene.background = new THREE.Color(0x070720)
        scene.fog = new THREE.Fog(0x070720, 28, 55)

        const camera = new THREE.PerspectiveCamera(58, window.innerWidth / window.innerHeight, 0.1, 80)
        camera.position.set(0, 13, 17)
        camera.lookAt(0, 0, 0)

        const renderer = new THREE.WebGLRenderer({ antialias: true })
        renderer.setSize(window.innerWidth, window.innerHeight)
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2))
        renderer.shadowMap.enabled = true
        renderer.shadowMap.type = THREE.PCFSoftShadowMap
        renderer.toneMapping = THREE.ACESFilmicToneMapping
        renderer.toneMappingExposure = 1.3
        document.body.prepend(renderer.domElement)

        // --- LIGHTS ---
        const ambient = new THREE.AmbientLight(0x4444aa, 0.4)
        scene.add(ambient)

        const dirLight = new THREE.DirectionalLight(0xffeedd, 2.8)
        dirLight.position.set(12, 22, 10)
        dirLight.castShadow = true
        dirLight.shadow.mapSize.width = 1024
        dirLight.shadow.mapSize.height = 1024
        dirLight.shadow.camera.near = 0.5
        dirLight.shadow.camera.far = 50
        dirLight.shadow.camera.left = -22
        dirLight.shadow.camera.right = 22
        dirLight.shadow.camera.top = 22
        dirLight.shadow.camera.bottom = -22
        scene.add(dirLight)

        const fillLight = new THREE.DirectionalLight(0x4488ff, 0.7)
        fillLight.position.set(-10, 6, -12)
        scene.add(fillLight)

        const rimLight = new THREE.DirectionalLight(0xff66aa, 0.35)
        rimLight.position.set(0, -6, -18)
        scene.add(rimLight)

        const glowLight = new THREE.PointLight(0x4ecca3, 0.5, 10)
        glowLight.position.set(0, 3, 0)
        scene.add(glowLight)

        // --- GROUND / PLATFORM ---
        const groundGeo = new THREE.PlaneGeometry(42, 42)
        const groundMat = new THREE.MeshStandardMaterial({
            color: 0x111144,
            roughness: 0.7,
            metalness: 0.15,
        })
        const ground = new THREE.Mesh(groundGeo, groundMat)
        ground.rotation.x = -Math.PI / 2
        ground.receiveShadow = true
        scene.add(ground)

        // Decorative rings on ground
        for (let i = 0; i < 6; i++) {
            const ringGeo = new THREE.RingGeometry(0.8 + i * 2.2, 1.0 + i * 2.2, 48)
            const ringMat = new THREE.MeshBasicMaterial({
                color: 0x4ecca3,
                transparent: true,
                opacity: 0.05 + i * 0.015,
                side: THREE.DoubleSide,
                depthWrite: false,
            })
            const ringMesh = new THREE.Mesh(ringGeo, ringMat)
            ringMesh.rotation.x = -Math.PI / 2
            ringMesh.position.y = 0.02
            scene.add(ringMesh)
        }

        const grid = new THREE.GridHelper(42, 24, 0x4ecca3, 0x4ecca3)
        grid.position.y = 0.04
        grid.material.opacity = 0.12
        grid.material.transparent = true
        scene.add(grid)

        // --- PLAYER (glowing sphere) ---
        const playerGroup = new THREE.Group()

        const bodyGeo = new THREE.SphereGeometry(0.75, 24, 24)
        const bodyMat = new THREE.MeshStandardMaterial({
            color: 0x4ecca3,
            roughness: 0.15,
            metalness: 0.7,
            emissive: 0x4ecca3,
            emissiveIntensity: 0.35,
        })
        const body = new THREE.Mesh(bodyGeo, bodyMat)
        body.castShadow = true
        playerGroup.add(body)

        // Outer glow layers
        for (let i = 0; i < 3; i++) {
            const gGeo = new THREE.SphereGeometry(0.85 + i * 0.2, 16, 16)
            const gMat = new THREE.MeshBasicMaterial({
                color: 0x4ecca3,
                transparent: true,
                opacity: 0.12 - i * 0.03,
                depthWrite: false,
            })
            const gMesh = new THREE.Mesh(gGeo, gMat)
            gMesh.position.y = 0
            playerGroup.add(gMesh)
        }

        // Corona particles around player
        const coronaCount = 40
        const coronaGeo = new THREE.BufferGeometry()
        const coronaPos = new Float32Array(coronaCount * 3)
        const coronaSizes = new Float32Array(coronaCount)
        for (let i = 0; i < coronaCount; i++) {
            const theta = Math.random() * Math.PI * 2
            const phi = Math.acos(2 * Math.random() - 1)
            const r = 1.1 + Math.random() * 0.6
            coronaPos[i * 3] = r * Math.sin(phi) * Math.cos(theta)
            coronaPos[i * 3 + 1] = r * Math.cos(phi)
            coronaPos[i * 3 + 2] = r * Math.sin(phi) * Math.sin(theta)
            coronaSizes[i] = 0.02 + Math.random() * 0.04
        }
        coronaGeo.setAttribute('position', new THREE.BufferAttribute(coronaPos, 3))
        coronaGeo.setAttribute('size', new THREE.BufferAttribute(coronaSizes, 1))
        const coronaMat = new THREE.PointsMaterial({
            color: 0x4ecca3,
            size: 0.04,
            transparent: true,
            opacity: 0.6,
            blending: THREE.AdditiveBlending,
            depthWrite: false,
        })
        const corona = new THREE.Points(coronaGeo, coronaMat)
        playerGroup.add(corona)

        playerGroup.position.y = 0.8
        scene.add(playerGroup)

        const PLAYER_SPEED = 9
        const BOUNDARY = 18

        // --- COLLECTIBLES (colored gems) ---
        const collectibles = []
        const COLLECTIBLE_COUNT = 15

        function spawnCollectible() {
            const gemGroup = new THREE.Group()

            // Main gem shape (octahedron with more detail)
            const geo = new THREE.OctahedronGeometry(0.55, 1)
            const hue = Math.random()
            const color = new THREE.Color().setHSL(hue, 0.85, 0.55)
            const mat = new THREE.MeshStandardMaterial({
                color: color,
                roughness: 0.1,
                metalness: 0.9,
                emissive: color,
                emissiveIntensity: 0.25,
                envMapIntensity: 1.2,
            })
            const mesh = new THREE.Mesh(geo, mat)
            mesh.castShadow = true
            gemGroup.add(mesh)

            // Inner glow core
            const coreGeo = new THREE.OctahedronGeometry(0.22, 0)
            const coreMat = new THREE.MeshBasicMaterial({
                color: 0xffffff,
                transparent: true,
                opacity: 0.5,
                blending: THREE.AdditiveBlending,
            })
            const core = new THREE.Mesh(coreGeo, coreMat)
            gemGroup.add(core)

            // Sparkle ring
            const ringGeo = new THREE.TorusGeometry(0.65, 0.025, 10, 20)
            const ringMat = new THREE.MeshBasicMaterial({
                color: color,
                transparent: true,
                opacity: 0.35,
                blending: THREE.AdditiveBlending,
            })
            const ring = new THREE.Mesh(ringGeo, ringMat)
            ring.rotation.x = Math.PI / 2
            ring.rotation.z = Math.random() * Math.PI
            gemGroup.add(ring)

            const angle = Math.random() * Math.PI * 2
            const dist = 3.5 + Math.random() * 11
            gemGroup.position.set(Math.cos(angle) * dist, 1.2 + Math.random() * 2.5, Math.sin(angle) * dist)

            scene.add(gemGroup)
            collectibles.push({
                group: gemGroup,
                mesh,
                ring,
                collected: false,
                floatPhase: Math.random() * Math.PI * 2,
                rotSpeed: 1.2 + Math.random() * 1.0,
                hue,
                dist,
                angle,
            })
        }

        for (let i = 0; i < COLLECTIBLE_COUNT; i++) spawnCollectible()

        // --- ENEMIES (red cubes) ---
        const enemies = []

        function spawnEnemy() {
            const group = new THREE.Group()

            const geo = new THREE.BoxGeometry(0.7, 0.7, 0.7)
            const mat = new THREE.MeshStandardMaterial({
                color: 0xe94560,
                roughness: 0.3,
                metalness: 0.4,
                emissive: 0xe94560,
                emissiveIntensity: 0.2,
            })
            const mesh = new THREE.Mesh(geo, mat)
            mesh.castShadow = true
            group.add(mesh)

            // Menacing glow
            const gGeo = new THREE.BoxGeometry(0.85, 0.85, 0.85)
            const gMat = new THREE.MeshBasicMaterial({
                color: 0xe94560,
                transparent: true,
                opacity: 0.12,
                blending: THREE.AdditiveBlending,
                depthWrite: false,
            })
            const gMesh = new THREE.Mesh(gGeo, gMat)
            group.add(gMesh)

            const angle = Math.random() * Math.PI * 2
            const dist = 5 + Math.random() * 9
            group.position.set(Math.cos(angle) * dist, 0.4, Math.sin(angle) * dist)

            scene.add(group)
            enemies.push({
                group,
                mesh,
                speed: 1.8 + Math.random() * 1.2,
                patrolAngle: angle,
                patrolDist: dist,
                verticalPhase: Math.random() * Math.PI * 2,
                rotSpeed: 1.2 + Math.random() * 1.5,
            })
        }

        for (let i = 0; i < 6; i++) spawnEnemy()

        // --- ENVIRONMENT PARTICLES ---
        const particleCount = 300
        const particleGeo = new THREE.BufferGeometry()
        const positions = new Float32Array(particleCount * 3)
        const particleColors = new Float32Array(particleCount * 3)
        const particleSizes = new Float32Array(particleCount)
        for (let i = 0; i < particleCount; i++) {
            positions[i * 3] = (Math.random() - 0.5) * 55
            positions[i * 3 + 1] = Math.random() * 18 + 0.5
            positions[i * 3 + 2] = (Math.random() - 0.5) * 55
            const c = new THREE.Color().setHSL(0.55 + Math.random() * 0.25, 0.5, 0.25 + Math.random() * 0.35)
            particleColors[i * 3] = c.r
            particleColors[i * 3 + 1] = c.g
            particleColors[i * 3 + 2] = c.b
            particleSizes[i] = 0.04 + Math.random() * 0.08
        }
        particleGeo.setAttribute('position', new THREE.BufferAttribute(positions, 3))
        particleGeo.setAttribute('color', new THREE.BufferAttribute(particleColors, 3))
        particleGeo.setAttribute('size', new THREE.BufferAttribute(particleSizes, 1))

        const particleMat = new THREE.PointsMaterial({
            size: 0.06,
            vertexColors: true,
            transparent: true,
            opacity: 0.5,
            blending: THREE.AdditiveBlending,
            depthWrite: false,
            sizeAttenuation: true,
        })
        const particles = new THREE.Points(particleGeo, particleMat)
        scene.add(particles)

        // --- INPUT ---
        const keys = {}
        let touchX = null,
            touchY = null

        document.addEventListener('keydown', e => { keys[e.key] = true })
        document.addEventListener('keyup', e => { keys[e.key] = false })

        renderer.domElement.addEventListener('touchstart', e => {
            const t = e.touches[0]
            touchX = t.clientX
            touchY = t.clientY
        })
        renderer.domElement.addEventListener('touchmove', e => {
            e.preventDefault()
            const t = e.touches[0]
            touchX = t.clientX
            touchY = t.clientY
        }, { passive: false })
        renderer.domElement.addEventListener('touchend', () => { touchX = null;
            touchY = null })

        // --- GAME STATE ---
        let score = 0
        let hp = 3
        const maxHp = 3
        let invincible = 0
        let gameOver = false
        let gameWon = false

        const scoreEl = document.getElementById('score')
        const hpEl = document.getElementById('hp')
        const msgEl = document.getElementById('msg')

        function updateUI() {
            scoreEl.textContent = `💎 ${score}`
            hpEl.textContent = '❤️'.repeat(Math.max(0, hp)) + '🖤'.repeat(Math.max(0, maxHp - hp))
        }

        function showMsg(text, sub) {
            msgEl.style.display = 'block'
            msgEl.innerHTML = text + (sub ? `<small>${sub}</small>` : '')
        }

        function hideMsg() {
            msgEl.style.display = 'none'
        }

        function restart() {
            playerGroup.position.set(0, 0.8, 0)
            body.material.color.setHex(0x4ecca3)
            body.material.emissive.setHex(0x4ecca3)
            hp = maxHp
            score = 0
            invincible = 0
            gameOver = false
            gameWon = false
            for (const c of collectibles) {
                c.collected = false
                c.group.visible = true
                const angle = Math.random() * Math.PI * 2
                const dist = 3.5 + Math.random() * 11
                c.angle = angle
                c.dist = dist
                c.group.position.set(Math.cos(angle) * dist, 1.2 + Math.random() * 2.5, Math.sin(angle) * dist)
            }
            for (const e of enemies) {
                const angle = Math.random() * Math.PI * 2
                const dist = 5 + Math.random() * 9
                e.patrolAngle = angle
                e.patrolDist = dist
                e.group.position.set(Math.cos(angle) * dist, 0.4, Math.sin(angle) * dist)
            }
            hideMsg()
            updateUI()
        }

        document.addEventListener('keydown', e => {
            if ((e.key === 'r' || e.key === 'R') && (gameOver || gameWon)) restart()
        })
        renderer.domElement.addEventListener('dblclick', () => {
            if (gameOver || gameWon) restart()
        })

        // --- UPDATE ---
        function update(dt) {
            if (gameOver || gameWon) return

            const now = Date.now() / 1000

            // --- Player movement ---
            let dx = 0,
                dz = 0
            if (keys['ArrowLeft'] || keys['a'] || keys['A']) dx = -1
            if (keys['ArrowRight'] || keys['d'] || keys['D']) dx = 1
            if (keys['ArrowUp'] || keys['w'] || keys['W']) dz = -1
            if (keys['ArrowDown'] || keys['s'] || keys['S']) dz = 1

            if (touchX !== null && touchY !== null) {
                const cx = window.innerWidth / 2
                const cy = window.innerHeight / 2
                dx = (touchX - cx) / cx
                dz = (touchY - cy) / cy
                if (Math.abs(dx) < 0.12) dx = 0
                if (Math.abs(dz) < 0.12) dz = 0
            }

            if (dx !== 0 && dz !== 0) { dx *= 0.707;
                dz *= 0.707 }
            playerGroup.position.x += dx * PLAYER_SPEED * dt
            playerGroup.position.z += dz * PLAYER_SPEED * dt
            playerGroup.position.x = Math.max(-BOUNDARY, Math.min(BOUNDARY, playerGroup.position.x))
            playerGroup.position.z = Math.max(-BOUNDARY, Math.min(BOUNDARY, playerGroup.position.z))

            if (dx !== 0 || dz !== 0) {
                playerGroup.rotation.y = Math.atan2(dx, dz)
            }

            // Player bob & glow pulse
            const bobSpeed = 4.5
            const bobAmount = 0.07
            body.position.y = Math.sin(now * bobSpeed) * bobAmount
            const pulse = 1 + Math.sin(now * 3) * 0.04
            body.material.emissiveIntensity = 0.3 + Math.sin(now * 2) * 0.08

            // Corona rotation
            corona.rotation.x += dt * 0.5
            corona.rotation.y += dt * 0.8

            // Invincibility
            if (invincible > 0) invincible--
            body.material.emissiveIntensity = invincible > 0 ? 0.7 : 0.3 + Math.sin(now * 2) * 0.08

            // --- Collectibles ---
            for (const c of collectibles) {
                if (c.collected) continue
                c.group.rotation.x += dt * c.rotSpeed * 0.7
                c.group.rotation.y += dt * c.rotSpeed * 1.2
                c.floatPhase += dt * 1.8
                c.group.position.y += Math.sin(c.floatPhase) * dt * 0.35
                if (c.ring) {
                    c.ring.rotation.z += dt * 1.2
                    c.ring.rotation.x = Math.PI / 2 + Math.sin(now + c.hue * 10) * 0.2
                }

                const dist = playerGroup.position.distanceTo(c.group.position)
                if (dist < 1.6) {
                    c.collected = true
                    c.group.visible = false
                    score += 100
                    // Score pop FX
                    const pop = document.createElement('div')
                    pop.textContent = '+100'
                    pop.style.cssText =
                        'position:fixed;pointer-events:none;color:#4ecca3;font-size:24px;font-weight:700;text-shadow:0 0 20px rgba(78,204,163,0.8);z-index:100;transition:all 0.8s ease-out;'
                    const pos3D = c.group.position.clone()
                    pos3D.project(camera)
                    const x = (pos3D.x * 0.5 + 0.5) * window.innerWidth
                    const y = (-pos3D.y * 0.5 + 0.5) * window.innerHeight
                    pop.style.left = x + 'px'
                    pop.style.top = y + 'px'
                    document.body.appendChild(pop)
                    requestAnimationFrame(() => {
                        pop.style.transform = 'translateY(-60px)'
                        pop.style.opacity = '0'
                    })
                    setTimeout(() => pop.remove(), 900)

                    updateUI()
                    // Respawn after delay
                    setTimeout(() => {
                        if (gameOver || gameWon) return
                        c.collected = false
                        c.group.visible = true
                        const angle = Math.random() * Math.PI * 2
                        const dist2 = 3.5 + Math.random() * 11
                        c.angle = angle
                        c.dist = dist2
                        c.group.position.set(Math.cos(angle) * dist2, 1.2 + Math.random() * 2.5, Math.sin(angle) * dist2)
                        c.floatPhase = Math.random() * Math.PI * 2
                    }, 800)
                }
            }

            // --- Enemies ---
            for (const e of enemies) {
                e.patrolAngle += dt * e.speed * 0.35
                const tx = Math.cos(e.patrolAngle) * e.patrolDist
                const tz = Math.sin(e.patrolAngle) * e.patrolDist
                e.group.position.x += (tx - e.group.position.x) * dt * 2.5
                e.group.position.z += (tz - e.group.position.z) * dt * 2.5
                e.verticalPhase += dt * 2.2
                e.group.position.y = 0.4 + Math.sin(e.verticalPhase) * 0.35
                e.group.rotation.x += dt * e.rotSpeed * 1.2
                e.group.rotation.y += dt * e.rotSpeed * 1.8

                // Pulsing glow
                e.mesh.material.emissiveIntensity = 0.15 + Math.sin(now * 4 + e.verticalPhase) * 0.1

                // Collision with player
                if (invincible === 0) {
                    const dist = playerGroup.position.distanceTo(e.group.position)
                    if (dist < 1.5) {
                        hp--
                        invincible = 90
                        // Flash red
                        body.material.color.setHex(0xff4444)
                        body.material.emissive.setHex(0xff4444)
                        setTimeout(() => {
                            body.material.color.setHex(0x4ecca3)
                            body.material.emissive.setHex(0x4ecca3)
                        }, 200)
                        // Shake camera
                        const origX = camera.position.x,
                            origZ = camera.position.z
                        let shakeTime = 0
                        const shakeInterval = setInterval(() => {
                            shakeTime += 0.03
                            camera.position.x = origX + (Math.random() - 0.5) * 0.4
                            camera.position.z = origZ + (Math.random() - 0.5) * 0.4
                            if (shakeTime > 0.25) {
                                clearInterval(shakeInterval)
                                camera.position.x = origX
                                camera.position.z = origZ
                            }
                        }, 30)

                        updateUI()
                        if (hp <= 0) {
                            gameOver = true
                            showMsg('💀 游戏结束', `最终分数: ${score}  按 R 重新开始`)
                        }
                    }
                }
            }

            // --- Particles drift ---
            const pos = particles.geometry.attributes.position.array
            for (let i = 0; i < particleCount; i++) {
                pos[i * 3 + 1] += Math.sin(now * 0.5 + i * 0.1) * dt * 0.015
                pos[i * 3] += Math.cos(now * 0.3 + i * 0.05) * dt * 0.005
                if (pos[i * 3 + 1] > 18) pos[i * 3 + 1] = 0.5
                if (pos[i * 3] > 27) pos[i * 3] = -27
                if (pos[i * 3] < -27) pos[i * 3] = 27
            }
            particles.geometry.attributes.position.needsUpdate = true

            // --- Camera follow ---
            const targetX = playerGroup.position.x * 0.3
            const targetZ = playerGroup.position.z + 16
            camera.position.x += (targetX - camera.position.x) * dt * 2.2
            camera.position.z += (targetZ - camera.position.z) * dt * 2.2
            camera.position.y = 13 + Math.sin(now * 0.1) * 0.3
            camera.lookAt(playerGroup.position.x * 0.5, 0.5, playerGroup.position.z * 0.5)

            // Update glow light
            glowLight.position.copy(playerGroup.position)
            glowLight.position.y += 2
            glowLight.intensity = 0.4 + Math.sin(now * 1.5) * 0.1
        }

        // --- GAME LOOP ---
        let lastTime = 0

        function animate(time) {
            const dt = Math.min((time - lastTime) / 1000, 0.05)
            lastTime = time
            update(dt)
            renderer.render(scene, camera)
            requestAnimationFrame(animate)
        }

        animate(0)

        // --- RESIZE ---
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight
            camera.updateProjectionMatrix()
            renderer.setSize(window.innerWidth, window.innerHeight)
        })

        // --- WIN CONDITION ---
        const winCheck = setInterval(() => {
            if (score >= 2500 && !gameOver && !gameWon) {
                gameWon = true
                showMsg('✨ 恭喜过关！ ✨', `最终分数: ${score}  按 R 重新开始`)
            }
        }, 500)

        updateUI()

        console.log('🎮 3D 宝石收集游戏已启动！')
        console.log('💡 收集彩色宝石得分，避开红色敌人')
        console.log('🏆 达到 2500 分即可通关')
    </script>
</body>
