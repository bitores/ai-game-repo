<!DOCTYPE html>
<html lang="zh-CN">
<head>
<!--
  AI Prompt / 提示词:
  一个数字华容道游戏，4x4方格，数字方块可以滑动，空格相邻的方块点击移动，打乱后复原。有计时和步数统计。
-->
<meta name="description" content="一个数字华容道游戏，4x4方格，数字方块可以滑动，空格相邻的方块点击移动，打乱后复原。有计时和步数统计。">

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>数字华容道</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
  display: flex; justify-content: center; align-items: center;
  min-height: 100vh; font-family: 'Segoe UI', 'PingFang SC', sans-serif;
  overflow: hidden; touch-action: none; user-select: none;
}
canvas { display: block; border-radius: 12px; box-shadow: 0 0 40px rgba(78, 204, 163, 0.15); }
</style>
</head>
<body>
<canvas id="game"></canvas>
<script>
const canvas = document.getElementById('game')
const ctx = canvas.getContext('2d')

const W = 500, H = 600
canvas.width = W
canvas.height = H

// --- CONFIG ---
const GRID_SIZE = 4
const TILE_SIZE = 110
const GAP = 6
const BOARD_SIZE = GRID_SIZE * (TILE_SIZE + GAP) + GAP
const OFFSET_X = (W - BOARD_SIZE) / 2
const OFFSET_Y = 80
const ANIM_DURATION = 140 // ms

// --- AUDIO ---
let audioCtx = null
function initAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)()
}

function playTone(freq, duration, type = 'sine', vol = 0.15) {
  try {
    initAudio()
    const osc = audioCtx.createOscillator()
    const gain = audioCtx.createGain()
    osc.connect(gain)
    gain.connect(audioCtx.destination)
    osc.type = type
    osc.frequency.setValueAtTime(freq, audioCtx.currentTime)
    osc.frequency.exponentialRampToValueAtTime(freq * 1.5, audioCtx.currentTime + duration * 0.3)
    gain.gain.setValueAtTime(vol, audioCtx.currentTime)
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration)
    osc.start(audioCtx.currentTime)
    osc.stop(audioCtx.currentTime + duration)
  } catch(e) { /* audio not available */ }
}

function playMoveSound() { playTone(520, 0.08, 'sine', 0.12) }
function playWinSound() {
  [523, 659, 784, 1047].forEach((f, i) => {
    setTimeout(() => playTone(f, 0.2, 'sine', 0.15), i * 120)
  })
}
function playShuffleSound() { playTone(300, 0.05, 'square', 0.06) }

// --- STATE ---
let tiles = []
let emptyIndex = -1
let moves = 0
let gameWon = false
let gameStarted = false
let timerStart = 0
let elapsedTime = 0

// Animation state
let animating = false
let animTile = null   // { fromRow, fromCol, toRow, toCol, value, startTime }

// Best score
let bestMoves = Infinity
let bestTime = Infinity

function loadBestScore() {
  try {
    const d = JSON.parse(localStorage.getItem('huarongdao_best'))
    if (d) { bestMoves = d.moves || Infinity; bestTime = d.time || Infinity }
  } catch(e) {}
}
function saveBestScore() {
  if (gameWon && moves < bestMoves) {
    bestMoves = moves; bestTime = Math.floor(elapsedTime / 1000)
    try { localStorage.setItem('huarongdao_best', JSON.stringify({ moves: bestMoves, time: bestTime })) } catch(e) {}
  }
}

// --- GAME LOGIC ---
function initGame() {
  tiles = []
  for (let i = 1; i < GRID_SIZE * GRID_SIZE; i++) tiles.push(i)
  tiles.push(0)
  shuffle()
  let attempts = 0
  while ((!isSolvable() || isSolved()) && attempts < 200) { shuffle(); attempts++ }
  emptyIndex = tiles.indexOf(0)
  moves = 0
  gameWon = false
  gameStarted = false
  elapsedTime = 0
  timerStart = 0
  animating = false
  animTile = null
}

function shuffle() {
  for (let i = tiles.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [tiles[i], tiles[j]] = [tiles[j], tiles[i]]
  }
  playShuffleSound()
}

function isSolvable() {
  let inv = 0
  const arr = tiles.filter(t => t !== 0)
  for (let i = 0; i < arr.length; i++)
    for (let j = i + 1; j < arr.length; j++)
      if (arr[i] > arr[j]) inv++
  const emptyRow = Math.floor(tiles.indexOf(0) / GRID_SIZE)
  if (GRID_SIZE % 2 === 0) return (inv + emptyRow) % 2 === 1
  return inv % 2 === 0
}

function isSolved() {
  for (let i = 0; i < tiles.length - 1; i++)
    if (tiles[i] !== i + 1) return false
  return tiles[tiles.length - 1] === 0
}

function canMove(idx) {
  const ei = emptyIndex
  const er = Math.floor(ei / GRID_SIZE), ec = ei % GRID_SIZE
  const ir = Math.floor(idx / GRID_SIZE), ic = idx % GRID_SIZE
  return Math.abs(er - ir) + Math.abs(ec - ic) === 1
}

function moveTile(idx) {
  if (gameWon || animating || !canMove(idx)) return false
  if (!gameStarted) {
    gameStarted = true
    timerStart = performance.now()
    elapsedTime = 0
  }

  // Start animation
  const fromRow = Math.floor(idx / GRID_SIZE)
  const fromCol = idx % GRID_SIZE
  const toRow = Math.floor(emptyIndex / GRID_SIZE)
  const toCol = emptyIndex % GRID_SIZE

  animTile = {
    fromRow, fromCol, toRow, toCol,
    value: tiles[idx],
    startTime: performance.now()
  }
  animating = true

  // Swap in state
  tiles[emptyIndex] = tiles[idx]
  tiles[idx] = 0
  emptyIndex = idx
  moves++
  playMoveSound()

  if (isSolved()) {
    gameWon = true
    saveBestScore()
    setTimeout(playWinSound, 150)
  }
  return true
}

// --- INPUT ---
let isTouching = false
let touchStartX = 0, touchStartY = 0

function getGridPos(clientX, clientY) {
  const rect = canvas.getBoundingClientRect()
  const scaleX = canvas.width / rect.width
  const scaleY = canvas.height / rect.height
  const mx = (clientX - rect.left) * scaleX
  const my = (clientY - rect.top) * scaleY
  if (my < OFFSET_Y || my > OFFSET_Y + BOARD_SIZE) return -1
  if (mx < OFFSET_X || mx > OFFSET_X + BOARD_SIZE) return -1
  const col = Math.floor((mx - OFFSET_X) / (TILE_SIZE + GAP))
  const row = Math.floor((my - OFFSET_Y) / (TILE_SIZE + GAP))
  if (col >= GRID_SIZE || row >= GRID_SIZE) return -1
  return row * GRID_SIZE + col
}

canvas.addEventListener('click', e => {
  const idx = getGridPos(e.clientX, e.clientY)
  if (idx >= 0) moveTile(idx)
})

canvas.addEventListener('touchstart', e => {
  e.preventDefault()
  const t = e.touches[0]
  touchStartX = t.clientX
  touchStartY = t.clientY
  isTouching = true
}, { passive: false })

canvas.addEventListener('touchend', e => {
  e.preventDefault()
  if (!isTouching) return
  isTouching = false
  const idx = getGridPos(touchStartX, touchStartY)
  if (idx >= 0) moveTile(idx)
}, { passive: false })

// Keyboard
document.addEventListener('keydown', e => {
  if (e.key === 'r' || e.key === 'R') {
    initGame()
    return
  }
  // Arrow keys: move tile into empty space
  if (!gameWon && !animating) {
    const er = Math.floor(emptyIndex / GRID_SIZE)
    const ec = emptyIndex % GRID_SIZE
    let target = -1
    switch (e.key) {
      case 'ArrowUp':    if (er < GRID_SIZE - 1) target = (er + 1) * GRID_SIZE + ec; break
      case 'ArrowDown':  if (er > 0) target = (er - 1) * GRID_SIZE + ec; break
      case 'ArrowLeft':  if (ec < GRID_SIZE - 1) target = er * GRID_SIZE + (ec + 1); break
      case 'ArrowRight': if (ec > 0) target = er * GRID_SIZE + (ec - 1); break
    }
    if (target >= 0) moveTile(target)
  }
})

// --- DRAW ---

// HSL tile color based on number
function tileColor(num) {
  const hue = ((num - 1) / 15) * 260 + 340 // 340 → 600 (wraps to nice colors)
  return `hsl(${hue % 360}, 70%, 55%)`
}
function tileColorLight(num) {
  const hue = ((num - 1) / 15) * 260 + 340
  return `hsl(${hue % 360}, 65%, 75%)`
}
function tileColorDark(num) {
  const hue = ((num - 1) / 15) * 260 + 340
  return `hsl(${hue % 360}, 60%, 40%)`
}

function draw() {
  ctx.fillStyle = '#1a1a3e'
  ctx.fillRect(0, 0, W, H)

  // Title
  ctx.fillStyle = '#4ecca3'
  ctx.font = 'bold 24px "Segoe UI", "PingFang SC", sans-serif'
  ctx.textAlign = 'center'
  ctx.textBaseline = 'top'
  ctx.fillText('数字华容道', W/2, 20)

  // Stats bar
  ctx.textBaseline = 'alphabetic'
  ctx.font = '15px "Segoe UI", sans-serif'

  // Moves
  ctx.textAlign = 'left'
  ctx.fillStyle = '#aaa'
  ctx.fillText('步数', OFFSET_X, OFFSET_Y - 25)
  ctx.fillStyle = '#fff'
  ctx.font = 'bold 18px "Segoe UI", sans-serif'
  ctx.fillText(moves.toString(), OFFSET_X, OFFSET_Y - 6)

  // Timer
  const sec = Math.floor(elapsedTime / 1000)
  const min = Math.floor(sec / 60)
  const timeStr = `${String(min).padStart(2, '0')}:${String(sec % 60).padStart(2, '0')}`
  ctx.textAlign = 'right'
  ctx.font = '15px "Segoe UI", sans-serif'
  ctx.fillStyle = '#aaa'
  ctx.fillText('时间', W - OFFSET_X, OFFSET_Y - 25)
  ctx.fillStyle = '#fff'
  ctx.font = 'bold 18px "Segoe UI", sans-serif'
  ctx.textAlign = 'right'
  ctx.fillText(timeStr, W - OFFSET_X, OFFSET_Y - 6)

  // Best score
  if (bestMoves < Infinity && bestTime < Infinity) {
    ctx.textAlign = 'center'
    ctx.font = '12px "Segoe UI", sans-serif'
    ctx.fillStyle = '#667'
    ctx.fillText(`最佳: ${bestMoves}步 / ${Math.floor(bestTime / 60)}:${String(bestTime % 60).padStart(2, '0')}`, W/2, OFFSET_Y - 6)
  }

  // Restart hint
  ctx.textAlign = 'right'
  ctx.font = '12px "Segoe UI", sans-serif'
  ctx.fillStyle = '#445'
  ctx.fillText('按 R 重新开始', W - OFFSET_X, H - 15)

  // Board background
  ctx.fillStyle = '#0f3460'
  ctx.beginPath()
  ctx.roundRect(OFFSET_X - 4, OFFSET_Y - 4, BOARD_SIZE + 8, BOARD_SIZE + 8, 10)
  ctx.fill()

  // Draw animation if active
  if (animating && animTile) {
    drawAnimatedTile()
  }

  // Tiles
  for (let i = 0; i < tiles.length; i++) {
    if (tiles[i] === 0) continue
    // Skip the tile being animated (it's drawn separately)
    if (animating && animTile && tiles[i] === animTile.value) continue

    const row = Math.floor(i / GRID_SIZE)
    const col = i % GRID_SIZE
    drawTile(tiles[i], col, row)
  }

  // Empty area
  if (emptyIndex >= 0) {
    const row = Math.floor(emptyIndex / GRID_SIZE)
    const col = emptyIndex % GRID_SIZE
    const x = OFFSET_X + col * (TILE_SIZE + GAP)
    const y = OFFSET_Y + row * (TILE_SIZE + GAP)
    ctx.fillStyle = '#1a1a3e'
    ctx.beginPath()
    ctx.roundRect(x, y, TILE_SIZE, TILE_SIZE, 8)
    ctx.fill()
    // subtle inner border
    ctx.strokeStyle = 'rgba(255,255,255,0.04)'
    ctx.lineWidth = 1
    ctx.beginPath()
    ctx.roundRect(x + 1, y + 1, TILE_SIZE - 2, TILE_SIZE - 2, 7)
    ctx.stroke()
  }

  // Win overlay
  if (gameWon) {
    drawWinOverlay()
  }
}

function drawTile(value, col, row) {
  const x = OFFSET_X + col * (TILE_SIZE + GAP)
  const y = OFFSET_Y + row * (TILE_SIZE + GAP)
  const pad = 2

  // Shadow
  ctx.shadowColor = 'rgba(0,0,0,0.3)'
  ctx.shadowBlur = 6
  ctx.shadowOffsetY = 3

  // Tile body with gradient
  const grad = ctx.createLinearGradient(x, y, x, y + TILE_SIZE)
  grad.addColorStop(0, tileColorLight(value))
  grad.addColorStop(0.3, tileColor(value))
  grad.addColorStop(1, tileColorDark(value))

  ctx.fillStyle = grad
  ctx.beginPath()
  ctx.roundRect(x + pad, y + pad, TILE_SIZE - pad * 2, TILE_SIZE - pad * 2, 8)
  ctx.fill()

  // Reset shadow for number
  ctx.shadowColor = 'transparent'
  ctx.shadowBlur = 0
  ctx.shadowOffsetY = 0

  // Inner highlight
  ctx.fillStyle = 'rgba(255,255,255,0.15)'
  ctx.beginPath()
  ctx.roundRect(x + pad + 4, y + pad + 4, TILE_SIZE - pad * 2 - 8, (TILE_SIZE - pad * 2) * 0.35, 6)
  ctx.fill()

  // Number
  ctx.fillStyle = '#fff'
  ctx.font = `bold ${value >= 10 ? 30 : 36}px "Segoe UI", sans-serif`
  ctx.textAlign = 'center'
  ctx.textBaseline = 'middle'
  ctx.fillText(value.toString(), x + TILE_SIZE / 2, y + TILE_SIZE / 2 + 1)
  ctx.textBaseline = 'alphabetic'
  ctx.textAlign = 'left'
}

function drawAnimatedTile() {
  if (!animTile) return
  const now = performance.now()
  const dt = now - animTile.startTime
  const t = Math.min(dt / ANIM_DURATION, 1)
  // Ease out cubic
  const ease = 1 - Math.pow(1 - t, 3)

  const fromX = OFFSET_X + animTile.fromCol * (TILE_SIZE + GAP)
  const fromY = OFFSET_Y + animTile.fromRow * (TILE_SIZE + GAP)
  const toX = OFFSET_X + animTile.toCol * (TILE_SIZE + GAP)
  const toY = OFFSET_Y + animTile.toRow * (TILE_SIZE + GAP)

  const curX = fromX + (toX - fromX) * ease
  const curY = fromY + (toY - fromY) * ease

  // Draw the tile at interpolated position
  const val = animTile.value
  const pad = 2

  // Shadow during animation
  ctx.shadowColor = 'rgba(0,0,0,0.4)'
  ctx.shadowBlur = 10
  ctx.shadowOffsetY = 4

  const grad = ctx.createLinearGradient(curX, curY, curX, curY + TILE_SIZE)
  grad.addColorStop(0, tileColorLight(val))
  grad.addColorStop(0.3, tileColor(val))
  grad.addColorStop(1, tileColorDark(val))
  ctx.fillStyle = grad
  ctx.beginPath()
  ctx.roundRect(curX + pad, curY + pad, TILE_SIZE - pad * 2, TILE_SIZE - pad * 2, 8)
  ctx.fill()

  ctx.shadowColor = 'transparent'
  ctx.shadowBlur = 0
  ctx.shadowOffsetY = 0

  // Inner highlight
  ctx.fillStyle = 'rgba(255,255,255,0.15)'
  ctx.beginPath()
  ctx.roundRect(curX + pad + 4, curY + pad + 4, TILE_SIZE - pad * 2 - 8, (TILE_SIZE - pad * 2) * 0.35, 6)
  ctx.fill()

  ctx.fillStyle = '#fff'
  ctx.font = `bold ${val >= 10 ? 30 : 36}px "Segoe UI", sans-serif`
  ctx.textAlign = 'center'
  ctx.textBaseline = 'middle'
  ctx.fillText(val.toString(), curX + TILE_SIZE / 2, curY + TILE_SIZE / 2 + 1)
  ctx.textBaseline = 'alphabetic'
  ctx.textAlign = 'left'

  if (t >= 1) {
    animating = false
    animTile = null
  }
}

function drawWinOverlay() {
  // Semi-transparent overlay with gradient
  const grad = ctx.createRadialGradient(W/2, H/2, 0, W/2, H/2, 400)
  grad.addColorStop(0, 'rgba(0,0,0,0.4)')
  grad.addColorStop(1, 'rgba(0,0,0,0.85)')
  ctx.fillStyle = grad
  ctx.fillRect(0, 0, W, H)

  // Win text
  ctx.textAlign = 'center'
  ctx.textBaseline = 'middle'

  ctx.shadowColor = 'rgba(78, 204, 163, 0.5)'
  ctx.shadowBlur = 20
  ctx.fillStyle = '#4ecca3'
  ctx.font = 'bold 44px "Segoe UI", "PingFang SC", sans-serif'
  ctx.fillText('恭喜完成！', W/2, H/2 - 50)

  ctx.shadowColor = 'transparent'
  ctx.shadowBlur = 0

  ctx.fillStyle = '#ddd'
  ctx.font = '20px "Segoe UI", sans-serif'
  const sec = Math.floor(elapsedTime / 1000)
  const min = Math.floor(sec / 60)
  ctx.fillText(`用时 ${min}:${String(sec % 60).padStart(2, '0')}  步数 ${moves}`, W/2, H/2 + 15)

  if (moves <= bestMoves) {
    ctx.fillStyle = '#f5a623'
    ctx.font = 'bold 16px "Segoe UI", sans-serif'
    ctx.fillText('★ 新纪录！', W/2, H/2 + 55)
  }

  ctx.fillStyle = '#aaa'
  ctx.font = '15px "Segoe UI", sans-serif'
  ctx.fillText('按 R 或点击重新开始', W/2, H/2 + 90)
  ctx.textBaseline = 'alphabetic'
  ctx.textAlign = 'left'
}

// --- ROUND RECT POLYFILL ---
if (!CanvasRenderingContext2D.prototype.roundRect) {
  CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
    if (r > w/2) r = w/2
    if (r > h/2) r = h/2
    this.moveTo(x + r, y)
    this.lineTo(x + w - r, y)
    this.quadraticCurveTo(x + w, y, x + w, y + r)
    this.lineTo(x + w, y + h - r)
    this.quadraticCurveTo(x + w, y + h, x + w - r, y + h)
    this.lineTo(x + r, y + h)
    this.quadraticCurveTo(x, y + h, x, y + h - r)
    this.lineTo(x, y + r)
    this.quadraticCurveTo(x, y, x + r, y)
    this.closePath()
  }
}

// --- GAME LOOP ---
function gameLoop() {
  if (gameStarted && !gameWon) {
    elapsedTime = performance.now() - timerStart
  }
  draw()
  requestAnimationFrame(gameLoop)
}

// --- RESIZE ---
function resize() {
  const scale = Math.min(window.innerWidth / W, window.innerHeight / H, 1)
  canvas.style.width = (W * scale) + 'px'
  canvas.style.height = (H * scale) + 'px'
}
window.addEventListener('resize', resize)

// --- START ---
loadBestScore()
initGame()
gameLoop()
resize()
</script>
</body>
</html>
