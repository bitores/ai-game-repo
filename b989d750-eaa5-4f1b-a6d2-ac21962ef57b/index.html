<!--
  AI Prompt / 提示词:
  核心玩法：玩家操控一艘搭载「星尘采集器」的飞船，在动态生成的小行星带中争夺星尘资源。移动方式为WASD控制水平位移、QE控制垂直升降、Shift加速，攻击方式包含三种武器：①星尘光束（鼠标左键，持续照射可分解小行星并吸收星尘），②引力榴弹（右键发射，爆炸后产生短暂重力井牵引周围星尘和敌机），③星核导弹（R键锁定，射出追踪弹命中后产生星核爆裂，将附近敌人短暂石化并掉落额外星尘）。得分条件为采集星尘数量+击毁敌机时抢夺其携带的星尘。操作方式：键盘WASD+QE+Shift控制移动，鼠标瞄准与射击（左键/右键），数字键1-3切换武器，R键特殊武器，空格释放能量护盾（消耗星尘充能）。视觉风格：太空废土+荧光矿物光泽，飞船带有锈蚀金属纹理和蓝色能量脉动，小行星呈现半透明水晶结构，内部流动荧光液体；敌方单位是机械蝎形采矿舰，被击毁时爆炸为荧光碎片和星尘粒子。HUD采用全息投影风格，显示星尘储量、护盾能量、武器充能、连击倍率。胜利条件：团队死斗模式下率先达到150星尘总量的团队获胜；或资源争夺模式下占领3个星尘泉眼并持续采集60秒。结束条件：单局时间结束（8分钟）按星尘总量判定；或任意玩家飞船被摧毁后立即进入观战模式（无复活），但可通过采集星尘复活队友（消耗50星尘）。
-->
