<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: linear-gradient(135deg, #0a0a2e 0%, #1a0a3e 30%, #2a0a4e 60%, #0a0a2e 100%);
  min-height: 100vh;
  font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
  display: flex;
  justify-content: center;
  padding: 20px;
  color: #fff;
  overflow-x: hidden;
}

/* Floating particles background */
body::before {
  content: '';
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background-image:
    radial-gradient(1px 1px at 10% 20%, rgba(255,255,255,0.3), transparent),
    radial-gradient(1px 1px at 30% 60%, rgba(255,255,255,0.2), transparent),
    radial-gradient(1.5px 1.5px at 50% 10%, rgba(255,255,255,0.3), transparent),
    radial-gradient(1px 1px at 70% 40%, rgba(255,255,255,0.2), transparent),
    radial-gradient(1px 1px at 90% 80%, rgba(255,255,255,0.25), transparent),
    radial-gradient(1.5px 1.5px at 15% 85%, rgba(255,255,255,0.15), transparent),
    radial-gradient(1px 1px at 45% 50%, rgba(255,255,255,0.2), transparent),
    radial-gradient(1px 1px at 80% 15%, rgba(255,255,255,0.3), transparent),
    radial-gradient(1.5px 1.5px at 60% 90%, rgba(255,255,255,0.15), transparent),
    radial-gradient(1px 1px at 25% 35%, rgba(255,255,255,0.2), transparent);
  pointer-events: none;
  z-index: 0;
}

.container {
  max-width: 800px;
  width: 100%;
  position: relative;
  z-index: 1;
}

/* Header */
.header {
  text-align: center;
  padding: 30px 0 20px;
}

.header h1 {
  font-size: 2.2em;
  background: linear-gradient(135deg, #f0e68c, #ffd700, #daa520);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  text-shadow: 0 0 30px rgba(255, 215, 0, 0.3);
  margin-bottom: 12px;
  letter-spacing: 2px;
}

.header p {
  color: #b8a9d4;
  font-size: 1.05em;
  letter-spacing: 4px;
}

/* Divider */
.divider {
  text-align: center;
  margin: 10px 0 20px;
  color: rgba(180, 160, 220, 0.3);
  font-size: 1.5em;
  letter-spacing: 20px;
}

/* Slot selection area */
.slot-area {
  display: flex;
  justify-content: center;
  gap: 16px;
  flex-wrap: wrap;
  margin: 15px 0;
  padding: 10px;
}

.slot-card {
  width: 120px;
  height: 180px;
  border-radius: 12px;
  cursor: pointer;
  position: relative;
  transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  transform-style: preserve-3d;
  perspective: 800px;
}

.slot-card-inner {
  width: 100%;
  height: 100%;
  position: relative;
  transform-style: preserve-3d;
  transition: transform 0.8s cubic-bezier(0.4, 0.0, 0.2, 1);
}

.slot-card.flipped .slot-card-inner {
  transform: rotateY(180deg);
}

.slot-front, .slot-back {
  position: absolute;
  width: 100%;
  height: 100%;
  border-radius: 12px;
  backface-visibility: hidden;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}

.slot-front {
  background: linear-gradient(145deg, #2a1a4e, #1a0a3e);
  border: 2px solid rgba(180, 140, 220, 0.3);
  box-shadow: 0 4px 20px rgba(100, 60, 180, 0.3), inset 0 1px 0 rgba(255,255,255,0.05);
}

.slot-front::before {
  content: '★';
  font-size: 2em;
  color: rgba(180, 140, 220, 0.4);
  margin-bottom: 8px;
}

.slot-front .slot-number {
  font-size: 0.75em;
  color: rgba(180, 140, 220, 0.3);
  letter-spacing: 2px;
}

.slot-back {
  background: linear-gradient(145deg, #1a0a3e, #0d0520);
  border: 2px solid rgba(200, 170, 240, 0.5);
  box-shadow: 0 4px 25px rgba(150, 100, 220, 0.4), inset 0 0 30px rgba(120, 60, 200, 0.15);
  transform: rotateY(180deg);
}

.slot-back .card-emoji {
  font-size: 2.8em;
  margin-bottom: 6px;
}

.slot-back .card-name {
  font-size: 0.85em;
  color: #d4c0f0;
  text-align: center;
  padding: 0 8px;
  line-height: 1.3;
}

.slot-card:hover {
  transform: translateY(-8px);
  box-shadow: 0 10px 30px rgba(150, 100, 220, 0.4);
}

.slot-card.selected {
  transform: translateY(-12px);
}

.slot-card.selected .slot-front {
  border-color: #ffd700;
  box-shadow: 0 0 25px rgba(255, 215, 0, 0.4), inset 0 0 15px rgba(255, 215, 0, 0.05);
}

/* Buttons */
.btn-area {
  display: flex;
  justify-content: center;
  gap: 16px;
  margin: 10px 0;
  flex-wrap: wrap;
}

.btn {
  padding: 12px 36px;
  border: none;
  border-radius: 30px;
  font-size: 1em;
  cursor: pointer;
  transition: all 0.3s ease;
  letter-spacing: 2px;
  font-weight: 600;
  font-family: inherit;
}

.btn-draw {
  background: linear-gradient(135deg, #7c3aed, #a855f7);
  color: #fff;
  box-shadow: 0 4px 20px rgba(124, 58, 237, 0.4);
}

.btn-draw:hover {
  transform: translateY(-3px);
  box-shadow: 0 8px 30px rgba(124, 58, 237, 0.5);
}

.btn-draw:active {
  transform: translateY(0);
}

.btn-draw:disabled {
  opacity: 0.4;
  cursor: not-allowed;
  transform: none;
}

.btn-reset {
  background: transparent;
  color: #b8a9d4;
  border: 1px solid rgba(180, 160, 220, 0.3);
}

.btn-reset:hover {
  background: rgba(180, 160, 220, 0.1);
  border-color: rgba(180, 160, 220, 0.6);
}

/* Result area */
.result-area {
  margin: 15px auto;
  padding: 25px;
  border-radius: 16px;
  background: linear-gradient(135deg, rgba(30, 15, 60, 0.8), rgba(20, 10, 50, 0.8));
  border: 1px solid rgba(180, 140, 220, 0.15);
  backdrop-filter: blur(10px);
  max-width: 500px;
  text-align: center;
  transition: all 0.5s ease;
  opacity: 0;
  transform: translateY(10px);
}

.result-area.visible {
  opacity: 1;
  transform: translateY(0);
}

.result-area .result-emoji {
  font-size: 3em;
  margin-bottom: 5px;
}

.result-area .result-title {
  font-size: 1.4em;
  color: #ffd700;
  margin-bottom: 4px;
  font-weight: bold;
}

.result-area .result-subtitle {
  font-size: 0.85em;
  color: #a890cc;
  margin-bottom: 12px;
}

.result-area .result-meaning {
  font-size: 0.95em;
  color: #d4c8f0;
  line-height: 1.7;
  text-align: left;
  padding: 0 10px;
}

/* Card Gallery */
.gallery-title {
  text-align: center;
  margin: 30px 0 15px;
  font-size: 1.2em;
  color: #b8a9d4;
  letter-spacing: 2px;
}

.gallery {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 8px;
  padding-bottom: 30px;
}

.gallery-card {
  width: 90px;
  height: 135px;
  border-radius: 8px;
  background: linear-gradient(145deg, #1a0a3e, #12082e);
  border: 1px solid rgba(180, 140, 220, 0.2);
  cursor: pointer;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  transition: all 0.3s ease;
  padding: 6px;
}

.gallery-card:hover {
  transform: translateY(-6px);
  border-color: rgba(180, 140, 220, 0.5);
  box-shadow: 0 6px 20px rgba(100, 60, 180, 0.3);
}

.gallery-card .card-emoji {
  font-size: 1.8em;
  margin-bottom: 3px;
}

.gallery-card .card-name {
  font-size: 0.6em;
  color: #b8a9d4;
  text-align: center;
  line-height: 1.2;
}

/* Modal */
.modal-overlay {
  display: none;
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.7);
  backdrop-filter: blur(5px);
  z-index: 100;
  justify-content: center;
  align-items: center;
  padding: 20px;
}

.modal-overlay.active {
  display: flex;
}

.modal {
  background: linear-gradient(135deg, #1a0a3e, #2a1a4e);
  border: 1px solid rgba(180, 140, 220, 0.3);
  border-radius: 20px;
  padding: 30px;
  max-width: 400px;
  width: 100%;
  position: relative;
  box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  text-align: center;
}

.modal .close-btn {
  position: absolute;
  top: 12px;
  right: 16px;
  background: none;
  border: none;
  color: #888;
  font-size: 1.5em;
  cursor: pointer;
  transition: color 0.2s;
}

.modal .close-btn:hover { color: #fff; }

.modal .modal-emoji {
  font-size: 3.5em;
  margin-bottom: 8px;
}

.modal .modal-title {
  font-size: 1.5em;
  color: #ffd700;
  font-weight: bold;
  margin-bottom: 4px;
}

.modal .modal-subtitle {
  font-size: 0.9em;
  color: #a890cc;
  margin-bottom: 15px;
}

.modal .modal-meaning {
  font-size: 0.95em;
  color: #d4c8f0;
  line-height: 1.8;
  text-align: left;
}

/* Animations */
@keyframes glow {
  0%, 100% { box-shadow: 0 0 20px rgba(150, 100, 220, 0.3); }
  50% { box-shadow: 0 0 40px rgba(150, 100, 220, 0.6); }
}

@keyframes float {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-6px); }
}

.slot-card.highlight {
  animation: glow 1.5s ease-in-out infinite;
}

.slot-card.floating {
  animation: float 3s ease-in-out infinite;
}

/* Responsive */
@media (max-width: 600px) {
  .header h1 { font-size: 1.6em; }
  .header p { font-size: 0.9em; letter-spacing: 2px; }
  .slot-card { width: 100px; height: 150px; }
  .gallery-card { width: 75px; height: 112px; }
  .gallery-card .card-emoji { font-size: 1.4em; }
  .gallery-card .card-name { font-size: 0.5em; }
  .slot-area { gap: 10px; }
  .result-area { margin: 15px 10px; }
}

@media (max-width: 400px) {
  .slot-card { width: 80px; height: 120px; }
  .gallery-card { width: 65px; height: 98px; }
  .btn { padding: 10px 24px; font-size: 0.9em; }
}
</style>
</head>

  { id: 17, name: '星星', en: 'The Star', emoji: '⭐', meaning: '希望、灵感、宁静。在最黑暗的时刻，星星为你指引方向。保持希望，相信未来充满光明与可能。', keyword: '希望' },
  { id: 18, name: '月亮', en: 'The Moon', emoji: '🌕', meaning: '幻觉、恐惧、潜意识。表面的平静下暗藏暗流。面对内心的恐惧，辨别真相与幻象。', keyword: '觉察' },
  { id: 19, name: '太阳', en: 'The Sun', emoji: '☀️', meaning: '喜悦、成功、活力。最积极的牌之一！快乐、成就与满足。你正处在人生的光明时期，尽情享受。', keyword: '喜悦' },
  { id: 20, name: '审判', en: 'Judgement', emoji: '📯', meaning: '觉醒、重生、召唤。内心的召唤响起，是时候做出重要的决定。过去的经验让你获得了新的领悟。', keyword: '觉醒' },
  { id: 21, name: '世界', en: 'The World', emoji: '🌍', meaning: '完成、成就、圆满。一个周期的完美结束，目标的实现。你已抵达旅程的终点，同时新的循环即将开始。', keyword: '圆满' }
];

// ========== STATE ==========
const SLOT_COUNT = 5;
let slots = [];          // Array of card indices or null
let selectedSlot = -1;
let hasDrawn = false;

const slotArea = document.getElementById('slotArea');
const gallery = document.getElementById('gallery');
const btnDraw = document.getElementById('btnDraw');
const btnReset = document.getElementById('btnReset');
const resultArea = document.getElementById('resultArea');
const resultEmoji = document.getElementById('resultEmoji');
const resultTitle = document.getElementById('resultTitle');
const resultSubtitle = document.getElementById('resultSubtitle');
const resultMeaning = document.getElementById('resultMeaning');

// Modal
const modal = document.getElementById('modal');
const modalClose = document.getElementById('modalClose');
const modalEmoji = document.getElementById('modalEmoji');
const modalTitle = document.getElementById('modalTitle');
const modalSubtitle = document.getElementById('modalSubtitle');
const modalMeaning = document.getElementById('modalMeaning');

// ========== INIT ==========
function initGame() {
  slots = new Array(SLOT_COUNT).fill(null);
  selectedSlot = -1;
  hasDrawn = false;
  resultArea.classList.remove('visible');
  btnDraw.disabled = true;
  renderSlots();
  updateButtonStates();
}

function renderSlots() {
  slotArea.innerHTML = '';
  for (let i = 0; i < SLOT_COUNT; i++) {
    const card = document.createElement('div');
    card.className = `slot-card${slots[i] !== null ? ' flipped' : ''}${selectedSlot === i ? ' selected' : ''}`;
    if (slots[i] === null) card.classList.add('floating');

    card.innerHTML = `
      <div class="slot-card-inner">
        <div class="slot-front">
          <div class="slot-number">第 ${i + 1} 张</div>
        </div>
        <div class="slot-back">
          ${slots[i] !== null ? `
            <div class="card-emoji">${TAROT_CARDS[slots[i]].emoji}</div>
            <div class="card-name">${TAROT_CARDS[slots[i]].name}</div>
          ` : '<div class="card-emoji">❓</div><div class="card-name">未抽取</div>'}
        </div>
      </div>
    `;

    if (!hasDrawn && slots[i] === null) {
      card.addEventListener('click', () => selectSlot(i));
    }

    slotArea.appendChild(card);
  }
}

function selectSlot(idx) {
  if (hasDrawn) return;
  if (slots[idx] !== null) return;
  selectedSlot = idx;
  btnDraw.disabled = false;
  renderSlots();
  updateButtonStates();
}

function updateButtonStates() {
  btnDraw.disabled = selectedSlot < 0 || hasDrawn;
}

// ========== DRAW CARD ==========
btnDraw.addEventListener('click', () => {
  if (selectedSlot < 0 || hasDrawn) return;

  // Pick a random card that hasn't been drawn yet
  const drawnCardIds = slots.filter(id => id !== null);
  const available = TAROT_CARDS.filter(c => !drawnCardIds.includes(c.id));

  if (available.length === 0) {
    alert('所有塔罗牌都已抽完！请重新开始。');
    return;
  }

  const randomIdx = Math.floor(Math.random() * available.length);
  const card = available[randomIdx];

  slots[selectedSlot] = card.id;
  hasDrawn = true;

  // Show result
  resultEmoji.textContent = card.emoji;
  resultTitle.textContent = `「${card.name}」`;
  resultSubtitle.textContent = `${card.en} — ${card.keyword}`;
  resultMeaning.textContent = card.meaning;
  resultArea.classList.add('visible');

  btnDraw.disabled = true;
  renderSlots();
});

// ========== RESET ==========
btnReset.addEventListener('click', initGame);

// ========== GALLERY ==========
function renderGallery() {
  gallery.innerHTML = '';
  TAROT_CARDS.forEach(card => {
    const el = document.createElement('div');
    el.className = 'gallery-card';
    el.innerHTML = `
      <div class="card-emoji">${card.emoji}</div>
      <div class="card-name">${card.name}</div>
    `;
    el.addEventListener('click', () => showCardDetail(card));
    gallery.appendChild(el);
  });
}

function showCardDetail(card) {
  modalEmoji.textContent = card.emoji;
  modalTitle.textContent = `「${card.name}」`;
  modalSubtitle.textContent = `${card.en} — ${card.keyword}`;
  modalMeaning.textContent = card.meaning;
  modal.classList.add('active');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  modal.classList.remove('active');
  document.body.style.overflow = '';
}

modalClose.addEventListener('click', closeModal);
modal.addEventListener('click', (e) => {
  if (e.target === modal) closeModal();
});

// ========== PARTICLES DYNAMIC ==========
function createParticles() {
  const style = document.createElement('style');
  let particles = '';
  for (let i = 0; i < 30; i++) {
    const x = Math.random() * 100;
    const y = Math.random() * 100;
    const size = Math.random() * 2 + 0.5;
    const opacity = Math.random() * 0.3 + 0.1;
    const delay = Math.random() * 8;
    const duration = Math.random() * 6 + 4;
    particles += `
      @keyframes twinkle${i} {
        0%, 100% { opacity: ${opacity}; transform: translate(0, 0); }
        50% { opacity: ${opacity * 0.3}; transform: translate(${(Math.random()-0.5)*30}px, ${(Math.random()-0.5)*30}px); }
      }
      .p${i} {
        position: fixed;
        width: ${size}px;
        height: ${size}px;
        left: ${x}%;
        top: ${y}%;
        background: rgba(200, 180, 255, ${opacity});
        border-radius: 50%;
        pointer-events: none;
        animation: twinkle${i} ${duration}s ease-in-out ${delay}s infinite;
        z-index: 0;
      }
    `;
  }
  style.textContent = particles;
  document.head.appendChild(style);

  for (let i = 0; i < 30; i++) {
    const dot = document.createElement('div');
    dot.className = `p${i}`;
    document.body.appendChild(dot);
  }
}

// ========== START ==========
createParticles();
renderGallery();
initGame();
</script>
</body>
</html>
