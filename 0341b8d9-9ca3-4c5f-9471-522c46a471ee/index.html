<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>时空逆转 · 弹幕射手</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #0a0a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Segoe UI', sans-serif;
            overflow: hidden;
            cursor: crosshair;
            touch-action: none;
            user-select: none;
        }
        canvas {
            display: block;
            border-radius: 8px;
            box-shadow: 0 0 60px rgba(0, 180, 255, 0.15);
        }
    </style>
</head>
<body>
    <canvas id="game"></canvas>
    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');

        const W = 840,
            H = 560;
        canvas.width = W;
        canvas.height = H;

        // ─── 核心常量 ───
        const REWIND_FRAMES = 110; // 约1.8秒 @60fps
        const REWIND_COOLDOWN = 300; // 5秒
        const MAX_HP = 5;
        const PLAYER_RADIUS = 16;

        // ─── 玩家 ───
        const player = {
            x: W / 2,
            y: H / 2,
            r: PLAYER_RADIUS,
            speed: 4.2,
            hp: MAX_HP,
            maxHp: MAX_HP,
            invincible: 0,
            // 回溯相关
            history: [],
            rewindReady: true,
            rewindCooldown: 0,
            rewindFlash: 0,
            isRewinding: false
        };

        // ─── 子弹与敌人 ───
        let bullets = [];
        let enemyBullets = [];
        let enemies = [];
        let particles = [];
        let pickups = [];

        // ─── 波次 ───
        let wave = 1;
        let enemiesSpawned = 0;
        let enemiesPerWave = 4;
        let waveDelay = 0;
        let spawnTimer = 0;
        let score = 0;
        let gameOver = false;
        let gameWon = false;
        let totalEnemiesKilled = 0;

        // ─── 射击 ───
        const FIRE_RATE = 9;
        let fireCooldown = 0;

        // ─── 输入 ───
        const keys = {};
        let mouseX = W / 2,
            mouseY = H / 2;
        let mouseDown = false;

        document.addEventListener('keydown', e => {
            keys[e.key] = true;
            if ((e.key === 'r' || e.key === 'R') && (gameOver || gameWon)) restart();
            if ((e.key === ' ' || e.key === 'Shift') && !gameOver && !gameWon) {
                e.preventDefault();
                triggerRewind();
            }
        });
        document.addEventListener('keyup', e => { keys[e.key] = false; });
        document.addEventListener('mousemove', e => {
            const rect = canvas.getBoundingClientRect();
            const sx = canvas.width / rect.width,
                sy = canvas.height / rect.height;
            mouseX = (e.clientX - rect.left) * sx;
            mouseY = (e.clientY - rect.top) * sy;
        });
        document.addEventListener('mousedown', e => { mouseDown = true; });
        document.addEventListener('mouseup', e => { mouseDown = false; });

        // 触屏
        canvas.addEventListener('touchstart', e => {
            e.preventDefault();
            const t = e.touches[0];
            const rect = canvas.getBoundingClientRect();
            const sx = canvas.width / rect.width,
                sy = canvas.height / rect.height;
            mouseX = (t.clientX - rect.left) * sx;
            mouseY = (t.clientY - rect.top) * sy;
            mouseDown = true;
        }, { passive: false });
        canvas.addEventListener('touchmove', e => {
            e.preventDefault();
            const t = e.touches[0];
            const rect = canvas.getBoundingClientRect();
            const sx = canvas.width / rect.width,
                sy = canvas.height / rect.height;
            mouseX = (t.clientX - rect.left) * sx;
            mouseY = (t.clientY - rect.top) * sy;
        }, { passive: false });
        canvas.addEventListener('touchend', e => {
            e.preventDefault();
            mouseDown = false;
        }, { passive: false });

        // ─── 工具 ───
        function dist(a, b) {
            return Math.sqrt((a.x - b.x) ** 2 + (a.y - b.y) ** 2);
        }

        function angle(a, b) {
            return Math.atan2(b.y - a.y, b.x - a.x);
        }

        function rand(min, max) { return min + Math.random() * (max - min); }

        function randInt(min, max) { return Math.floor(rand(min, max + 1)); }

        function clamp(v, min, max) { return Math.max(min, Math.min(max, v)); }

        // ─── 回溯系统 ───
        function recordHistory() {
            if (player.isRewinding) return;
            player.history.push({ x: player.x, y: player.y, hp: player.hp });
            if (player.history.length > REWIND_FRAMES) {
                player.history.shift();
            }
        }

        function triggerRewind() {
            if (!player.rewindReady || player.rewindCooldown > 0 || player.isRewinding) return;
            if (player.history.length < 20) return;

            const target = player.history[0];
            if (!target) return;

            player.isRewinding = true;
            player.rewindReady = false;
            player.rewindCooldown = REWIND_COOLDOWN;
            player.rewindFlash = 24;

            // 特效：从当前位置到目标位置生成时间粒子
            const steps = 30;
            for (let i = 0; i < steps; i++) {
                const t = i / steps;
                const px = player.x + (target.x - player.x) * t;
                const py = player.y + (target.y - player.y) * t;
                addParticles(px, py, '#00d4ff', 3, 1 + Math.random() * 2);
            }

            // 执行回溯
            player.x = target.x;
            player.y = target.y;
            // 血量回溯：取历史中最低值更公平，但这里用历史记录的值
            const histHp = target.hp;
            if (histHp < player.hp) {
                // 受伤回溯：回到过去 healthier 状态
                player.hp = Math.min(player.maxHp, histHp + 1);
            } else {
                player.hp = Math.min(player.maxHp, histHp);
            }
            player.hp = clamp(player.hp, 1, player.maxHp);
            player.invincible = 40;

            // 清空历史中已使用的部分，避免重复回溯到同一位置
            player.history.splice(0, Math.min(40, player.history.length));

            // 爆炸性时间粒子
            for (let i = 0; i < 50; i++) {
                const ang = rand(0, Math.PI * 2);
                const spd = rand(2, 7);
                particles.push({
                    x: player.x,
                    y: player.y,
                    vx: Math.cos(ang) * spd,
                    vy: Math.sin(ang) * spd,
                    r: rand(2, 5),
                    life: rand(15, 40),
                    maxLife: 40,
                    color: '#00d4ff',
                    type: 'time'
                });
            }

            // 屏幕震动感：通过快速闪烁模拟
            setTimeout(() => {
                player.isRewinding = false;
            }, 150);
        }

        // ─── 粒子系统 ───
        function addParticles(x, y, color, count, speed) {
            for (let i = 0; i < count; i++) {
                const ang = rand(0, Math.PI * 2);
                const spd = rand(1, speed || 4);
                particles.push({
                    x,
                    y,
                    vx: Math.cos(ang) * spd,
                    vy: Math.sin(ang) * spd,
                    r: rand(1.5, 4),
                    life: rand(15, 35),
                    maxLife: 35,
                    color,
                    type: 'normal'
                });
            }
        }

        function addExplosion(x, y, color, count, speed) {
            for (let i = 0; i < count; i++) {
                const ang = rand(0, Math.PI * 2);
                const spd = rand(1, speed || 5);
                particles.push({
                    x,
                    y,
                    vx: Math.cos(ang) * spd,
                    vy: Math.sin(ang) * spd,
                    r: rand(2, 6),
                    life: rand(20, 50),
                    maxLife: 50,
                    color,
                    type: 'explode'
                });
            }
        }

        // ─── 敌人类型 ───
        function createEnemy(type) {
            let x, y;
            const side = randInt(0, 3);
            if (side === 0) { x = rand(0, W);
                y = -40; } else if (side === 1) { x = W + 40;
                y = rand(0, H); } else if (side === 2) { x = rand(0, W);
                y = H + 40; } else { x = -40;
                y = rand(0, H); }

            const base = {
                x,
                y,
                r: 15 + wave * 1.2,
                hp: Math.ceil(wave / 2) + 1,
                maxHp: Math.ceil(wave / 2) + 1,
                speed: 0.8 + wave * 0.08,
                type: type || 'normal',
                fireTimer: rand(30, 90),
                fireRate: 60 + Math.max(0, 80 - wave * 4),
                vx: 0,
                vy: 0,
                hitFlash: 0
            };

            if (type === 'sniper') {
                base.r = 13 + wave * 0.8;
                base.hp = 2 + Math.floor(wave / 3);
                base.maxHp = base.hp;
                base.speed = 1.0 + wave * 0.06;
                base.fireRate = 50 + Math.max(0, 60 - wave * 2);
            } else if (type === 'scatter') {
                base.r = 18 + wave * 1.0;
                base.hp = 2 + Math.floor(wave / 2);
                base.maxHp = base.hp;
                base.speed = 0.6 + wave * 0.05;
                base.fireRate = 70 + Math.max(0, 90 - wave * 3);
            } else if (type === 'orbiter') {
                base.r = 12 + wave * 0.6;
                base.hp = 1 + Math.floor(wave / 4);
                base.maxHp = base.hp;
                base.speed = 1.6 + wave * 0.1;
                base.fireRate = 40 + Math.max(0, 50 - wave * 2);
                base.orbitAngle = rand(0, Math.PI * 2);
                base.orbitSpeed = 0.02 + wave * 0.005;
                base.orbitRadius = 60 + wave * 5;
                base.leader = null;
            }
            return base;
        }

        // ─── 生成敌人 ───
        function spawnEnemy() {
            if (enemiesSpawned >= enemiesPerWave) return;
            let type = 'normal';
            const r = Math.random();
            if (wave >= 3 && r < 0.2) type = 'sniper';
            else if (wave >= 5 && r < 0.35) type = 'scatter';
            else if (wave >= 7 && r < 0.45) type = 'orbiter';
            else if (wave >= 9 && r < 0.5) type = 'scatter';

            // 保证每波都有混合
            if (wave >= 4 && enemiesSpawned === 0) type = 'sniper';
            if (wave >= 6 && enemiesSpawned === 1) type = 'scatter';
            if (wave >= 8 && enemiesSpawned === 2) type = 'orbiter';

            const e = createEnemy(type);
            enemies.push(e);
            enemiesSpawned++;
        }

        // ─── 敌人射击 ───
        function enemyShoot(e) {
            if (e.type === 'normal') {
                // 单发瞄准
                const a = angle(e, player);
                const spd = 3.0 + wave * 0.15;
                enemyBullets.push({
                    x: e.x,
                    y: e.y,
                    vx: Math.cos(a) * spd,
                    vy: Math.sin(a) * spd,
                    r: 5,
                    color: '#ff6b6b',
                    life: 300
                });
            } else if (e.type === 'sniper') {
                // 快速高精度子弹
                const a = angle(e, player);
                const spd = 5.5 + wave * 0.2;
                enemyBullets.push({
                    x: e.x,
                    y: e.y,
                    vx: Math.cos(a) * spd,
                    vy: Math.sin(a) * spd,
                    r: 4,
                    color: '#c084fc',
                    life: 250,
                    trail: true
                });
            } else if (e.type === 'scatter') {
                // 扇形散射
                const a = angle(e, player);
                const count = 3 + Math.min(wave, 7);
                const spread = 0.4 + wave * 0.03;
                const spd = 2.8 + wave * 0.12;
                for (let i = 0; i < count; i++) {
                    const offset = (i / (count - 1) - 0.5) * spread;
                    const ang = a + offset;
                    enemyBullets.push({
                        x: e.x,
                        y: e.y,
                        vx: Math.cos(ang) * spd + rand(-0.3, 0.3),
                        vy: Math.sin(ang) * spd + rand(-0.3, 0.3),
                        r: 4 + rand(0, 2),
                        color: '#fb923c',
                        life: 200
                    });
                }
            } else if (e.type === 'orbiter') {
                // 环绕射击
                const a = e.orbitAngle || 0;
                const spd = 2.5 + wave * 0.1;
                for (let i = 0; i < 2; i++) {
                    const ang = a + i * Math.PI;
                    enemyBullets.push({
                        x: e.x + Math.cos(ang) * 8,
                        y: e.y + Math.sin(ang) * 8,
                        vx: Math.cos(ang) * spd,
                        vy: Math.sin(ang) * spd,
                        r: 3,
                        color: '#34d399',
                        life: 180
                    });
                }
            }
        }

        // ─── 道具系统 ───
        function spawnPickup(x, y) {
            if (Math.random() > 0.20) return;
            const type = Math.random() < 0.5 ? 'health' : 'rewind';
            pickups.push({
                x,
                y,
                r: 10,
                type: type,
                life: 400,
                bob: rand(0, Math.PI * 2),
                color: type === 'health' ? '#4ecca3' : '#00d4ff'
            });
        }

        // ─── 更新 ───
        function update() {
            if (gameOver || gameWon) return;

            // ── 玩家移动 ──
            let dx = 0,
                dy = 0;
            if (keys['ArrowLeft'] || keys['a'] || keys['A']) dx = -1;
            if (keys['ArrowRight'] || keys['d'] || keys['D']) dx = 1;
            if (keys['ArrowUp'] || keys['w'] || keys['W']) dy = -1;
            if (keys['ArrowDown'] || keys['s'] || keys['S']) dy = 1;
            if (dx !== 0 && dy !== 0) { dx *= 0.707;
                dy *= 0.707 }
            player.x += dx * player.speed;
            player.y += dy * player.speed;
            player.x = clamp(player.x, player.r, W - player.r);
            player.y = clamp(player.y, player.r, H - player.r);

            // ── 回溯冷却 ──
            if (player.rewindCooldown > 0) {
                player.rewindCooldown--;
                if (player.rewindCooldown === 0) player.rewindReady = true;
            }
            if (player.rewindFlash > 0) player.rewindFlash--;
            if (player.invincible > 0) player.invincible--;

            // ── 记录历史 ──
            recordHistory();

            // ── 射击 ──
            if (fireCooldown > 0) fireCooldown--;
            if (mouseDown && fireCooldown === 0) {
                const a = angle(player, { x: mouseX, y: mouseY });
                const spd = 9;
                bullets.push({
                    x: player.x + Math.cos(a) * 20,
                    y: player.y + Math.sin(a) * 20,
                    vx: Math.cos(a) * spd,
                    vy: Math.sin(a) * spd,
                    r: 4.5,
                    life: 80,
                    color: '#ffd700'
                });
                fireCooldown = FIRE_RATE;
                // 射击后坐力粒子
                addParticles(player.x - Math.cos(a) * 8, player.y - Math.sin(a) * 8, '#ffd700', 2, 1.5);
            }

            // ── 玩家子弹 ──
            for (let i = bullets.length - 1; i >= 0; i--) {
                const b = bullets[i];
                b.x += b.vx;
                b.y += b.vy;
                b.life--;
                if (b.x < -30 || b.x > W + 30 || b.y < -30 || b.y > H + 30 || b.life <= 0) {
                    bullets.splice(i, 1);
                    continue;
                }
                // 命中敌人
                for (let j = enemies.length - 1; j >= 0; j--) {
                    const e = enemies[j];
                    if (dist(b, e) < b.r + e.r) {
                        bullets.splice(i, 1);
                        e.hp--;
                        e.hitFlash = 6;
                        addParticles(b.x, b.y, '#ffd700', 5, 3);
                        if (e.hp <= 0) {
                            addExplosion(e.x, e.y, '#ff6b6b', 20, 5);
                            addExplosion(e.x, e.y, '#ffd700', 10, 3);
                            score += 100 * wave + 50 * (e.type !== 'normal' ? 1 : 0);
                            totalEnemiesKilled++;
                            spawnPickup(e.x, e.y);
                            enemies.splice(j, 1);
                        }
                        break;
                    }
                }
            }

            // ── 波次管理 ──
            if (enemiesSpawned < enemiesPerWave) {
                spawnTimer--;
                if (spawnTimer <= 0) {
                    spawnEnemy();
                    spawnTimer = Math.max(5, 25 - wave);
                }
            } else {
                spawnTimer = 20;
            }

            // 波次结束
            if (enemiesSpawned >= enemiesPerWave && enemies.length === 0) {
                wave++;
                enemiesSpawned = 0;
                enemiesPerWave = 4 + wave * 2 + Math.floor(wave / 2);
                if (wave > 12) { gameWon = true; return; }
                // 波次奖励
                score += wave * 50;
                // 波次特效
                for (let i = 0; i < 30; i++) {
                    particles.push({
                        x: rand(0, W),
                        y: rand(0, H),
                        vx: rand(-0.5, 0.5),
                        vy: rand(-2, -0.5),
                        r: rand(1, 3),
                        life: rand(30, 60),
                        maxLife: 60,
                        color: '#4ecca3',
                        type: 'wave'
                    });
                }
            }

            // ── 敌人行为 ──
            for (let i = enemies.length - 1; i >= 0; i--) {
                const e = enemies[i];
                if (e.hitFlash > 0) e.hitFlash--;

                // 移动
                if (e.type === 'orbiter') {
                    // 环绕玩家运动
                    e.orbitAngle = (e.orbitAngle || 0) + (e.orbitSpeed || 0.03);
                    const targetX = player.x + Math.cos(e.orbitAngle) * e.orbitRadius;
                    const targetY = player.y + Math.sin(e.orbitAngle) * e.orbitRadius;
                    const a = angle(e, { x: targetX, y: targetY });
                    const spd = e.speed * 1.2;
                    e.x += Math.cos(a) * spd;
                    e.y += Math.sin(a) * spd;
                } else {
                    // 追踪玩家
                    const a = angle(e, player);
                    e.x += Math.cos(a) * e.speed;
                    e.y += Math.sin(a) * e.speed;
                }
                e.x = clamp(e.x, -50, W + 50);
                e.y = clamp(e.y, -50, H + 50);

                // 射击
                e.fireTimer--;
                if (e.fireTimer <= 0) {
                    if (dist(e, player) < 600) {
                        enemyShoot(e);
                    }
                    e.fireTimer = e.fireRate + randInt(0, 30);
                }

                // 与玩家碰撞
                if (player.invincible === 0 && !player.isRewinding) {
                    if (dist(player, e) < player.r + e.r) {
                        player.hp--;
                        player.invincible = 50;
                        addExplosion(player.x, player.y, '#4ecca3', 15, 4);
                        addParticles(player.x, player.y, '#ff6b6b', 10, 3);
                        if (player.hp <= 0) {
                            gameOver = true;
                            addExplosion(player.x, player.y, '#ff4444', 40, 7);
                            return;
                        }
                    }
                }
            }

            // ── 敌人子弹 ──
            for (let i = enemyBullets.length - 1; i >= 0; i--) {
                const b = enemyBullets[i];
                b.x += b.vx;
                b.y += b.vy;
                b.life--;
                if (b.x < -50 || b.x > W + 50 || b.y < -50 || b.y > H + 50 || b.life <= 0) {
                    enemyBullets.splice(i, 1);
                    continue;
                }
                // 碰撞玩家
                if (player.invincible === 0 && !player.isRewinding) {
                    if (dist(player, b) < player.r + b.r) {
                        player.hp--;
                        player.invincible = 40;
                        addExplosion(b.x, b.y, b.color || '#ff6b6b', 10, 3);
                        enemyBullets.splice(i, 1);
                        if (player.hp <= 0) {
                            gameOver = true;
                            addExplosion(player.x, player.y, '#ff4444', 40, 7);
                            return;
                        }
                        continue;
                    }
                }
                // 子弹拖尾
                if (b.trail) {
                    addParticles(b.x, b.y, b.color || '#c084fc', 1, 0.5);
                }
            }

            // ── 道具 ──
            for (let i = pickups.length - 1; i >= 0; i--) {
                const p = pickups[i];
                p.bob += 0.05;
                p.y += Math.sin(p.bob) * 0.15;
                p.life--;
                if (p.life <= 0) { pickups.splice(i, 1); continue; }
                if (dist(player, p) < player.r + p.r) {
                    if (p.type === 'health') {
                        player.hp = Math.min(player.maxHp, player.hp + 2);
                        addParticles(p.x, p.y, '#4ecca3', 15, 4);
                    } else if (p.type === 'rewind') {
                        player.rewindCooldown = 0;
                        player.rewindReady = true;
                        addParticles(p.x, p.y, '#00d4ff', 20, 5);
                    }
                    pickups.splice(i, 1);
                    score += 20;
                }
            }

            // ── 粒子 ──
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.x += p.vx;
                p.y += p.vy;
                p.vx *= 0.97;
                p.vy *= 0.97;
                p.life--;
                if (p.life <= 0) { particles.splice(i, 1); }
            }
        }

        // ─── 渲染 ───
        function draw() {
            // 背景
            ctx.fillStyle = '#0a0a1a';
            ctx.fillRect(0, 0, W, H);

            // 星空
            for (let i = 0; i < 100; i++) {
                const sx = (i * 137.5 + 41) % W;
                const sy = (i * 97.3 + 17) % H;
                const sr = 0.6 + (i % 4) * 0.4;
                ctx.globalAlpha = 0.25 + (i % 5) * 0.12;
                ctx.fillStyle = '#ffffff';
                ctx.beginPath();
                ctx.arc(sx, sy, sr, 0, Math.PI * 2);
                ctx.fill();
            }
            ctx.globalAlpha = 1;

            // 波次过渡特效
            if (enemies.length === 0 && enemiesSpawned >= enemiesPerWave && !gameOver && !gameWon) {
                ctx.globalAlpha = 0.15 + 0.1 * Math.sin(Date.now() / 300);
                ctx.fillStyle = '#4ecca3';
                ctx.font = '22px sans-serif';
                ctx.textAlign = 'center';
                ctx.fillText('⚡ 第 ' + (wave + 1) + ' 波即将来袭 ⚡', W / 2, 60);
                ctx.textAlign = 'left';
                ctx.globalAlpha = 1;
            }

            // ── 道具 ──
            for (const p of pickups) {
                const glow = 0.6 + 0.4 * Math.sin(p.bob * 2);
                ctx.globalAlpha = Math.min(1, p.life / 100) * glow;
                ctx.fillStyle = p.color;
                ctx.shadowColor = p.color;
                ctx.shadowBlur = 15;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
                ctx.fill();
                ctx.shadowBlur = 0;
                ctx.fillStyle = '#fff';
                ctx.font = '12px sans-serif';
                ctx.textAlign = 'center';
                ctx.fillText(p.type === 'health' ? '+' : '↺', p.x, p.y + 4);
                ctx.textAlign = 'left';
                ctx.globalAlpha = 1;
            }

            // ── 敌人子弹 ──
            for (const b of enemyBullets) {
                ctx.shadowColor = b.color || '#ff6b6b';
                ctx.shadowBlur = 12;
                ctx.fillStyle = b.color || '#ff6b6b';
                ctx.beginPath();
                ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
                ctx.fill();
                ctx.shadowBlur = 0;
                // 内圈高光
                ctx.fillStyle = 'rgba(255,255,255,0.3)';
                ctx.beginPath();
                ctx.arc(b.x - 1, b.y - 1, b.r * 0.4, 0, Math.PI * 2);
                ctx.fill();
            }

            // ── 敌人 ──
            for (const e of enemies) {
                const isHit = e.hitFlash > 0;
                // 光晕
                ctx.shadowColor = isHit ? '#fff' : '#e94560';
                ctx.shadowBlur = isHit ? 25 : 12;
                // 主体
                const grad = ctx.createRadialGradient(e.x - 4, e.y - 4, 2, e.x, e.y, e.r);
                if (e.type === 'sniper') {
                    grad.addColorStop(0, isHit ? '#fff' : '#d8b4fe');
                    grad.addColorStop(1, isHit ? '#c084fc' : '#7c3aed');
                } else if (e.type === 'scatter') {
                    grad.addColorStop(0, isHit ? '#fff' : '#fdba74');
                    grad.addColorStop(1, isHit ? '#fb923c' : '#ea580c');
                } else if (e.type === 'orbiter') {
                    grad.addColorStop(0, isHit ? '#fff' : '#6ee7b7');
                    grad.addColorStop(1, isHit ? '#34d399' : '#059669');
                } else {
                    grad.addColorStop(0, isHit ? '#fff' : '#ff8a8a');
                    grad.addColorStop(1, isHit ? '#e94560' : '#c23152');
                }
                ctx.fillStyle = grad;
                ctx.beginPath();
                ctx.arc(e.x, e.y, e.r, 0, Math.PI * 2);
                ctx.fill();
                ctx.shadowBlur = 0;

                // 眼睛/核心
                ctx.fillStyle = 'rgba(255,255,255,0.8)';
                ctx.beginPath();
                ctx.arc(e.x - 4, e.y - 4, e.r * 0.3, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = 'rgba(0,0,0,0.6)';
                ctx.beginPath();
                ctx.arc(e.x - 5, e.y - 5, e.r * 0.15, 0, Math.PI * 2);
                ctx.fill();

                // 血条
                if (e.hp < e.maxHp) {
                    const bw = e.r * 1.6;
                    ctx.fillStyle = 'rgba(0,0,0,0.5)';
                    ctx.fillRect(e.x - bw / 2, e.y - e.r - 10, bw, 4);
                    ctx.fillStyle = '#4ecca3';
                    ctx.fillRect(e.x - bw / 2, e.y - e.r - 10, bw * (e.hp / e.maxHp), 4);
                }

                // 类型标记
                if (e.type === 'sniper') {
                    ctx.strokeStyle = '#c084fc';
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    ctx.moveTo(e.x + e.r * 0.7, e.y);
                    ctx.lineTo(e.x + e.r * 1.3, e.y);
                    ctx.stroke();
                } else if (e.type === 'scatter') {
                    for (let k = 0; k < 3; k++) {
                        const ang = k * Math.PI * 2 / 3 + Date.now() / 1000;
                        ctx.fillStyle = '#fb923c';
                        ctx.beginPath();
                        ctx.arc(e.x + Math.cos(ang) * e.r * 0.8, e.y + Math.sin(ang) * e.r * 0.8, 3, 0, Math.PI * 2);
                        ctx.fill();
                    }
                } else if (e.type === 'orbiter') {
                    ctx.strokeStyle = '#34d399';
                    ctx.lineWidth = 1.5;
                    ctx.setLineDash([3, 5]);
                    ctx.beginPath();
                    ctx.arc(e.x, e.y, e.r * 0.9, 0, Math.PI * 2);
                    ctx.stroke();
                    ctx.setLineDash([]);
                }
            }

            // ── 玩家子弹 ──
            for (const b of bullets) {
                ctx.shadowColor = '#ffd700';
                ctx.shadowBlur = 18;
                ctx.fillStyle = '#ffd700';
                ctx.beginPath();
                ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
                ctx.fill();
                ctx.shadowBlur = 0;
                ctx.fillStyle = 'rgba(255,255,255,0.5)';
                ctx.beginPath();
                ctx.arc(b.x - 1.5, b.y - 1.5, b.r * 0.4, 0, Math.PI * 2);
                ctx.fill();
            }

            // ── 粒子 ──
            for (const p of particles) {
                const alpha = p.life / p.maxLife;
                ctx.globalAlpha = alpha;
                ctx.fillStyle = p.color;
                if (p.type === 'time') {
                    ctx.shadowColor = '#00d4ff';
                    ctx.shadowBlur = 20;
                } else {
                    ctx.shadowBlur = 0;
                }
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.r * alpha, 0, Math.PI * 2);
                ctx.fill();
            }
            ctx.globalAlpha = 1;
            ctx.shadowBlur = 0;

            // ── 玩家 ──
            if (!gameOver && !gameWon) {
                const flash = player.invincible > 0 && Math.floor(player.invincible / 4) % 2 === 0;
                // 回溯光环
                if (player.rewindFlash > 0) {
                    ctx.shadowColor = '#00d4ff';
                    ctx.shadowBlur = 40;
                    ctx.strokeStyle = `rgba(0,212,255,${player.rewindFlash / 24 * 0.5})`;
                    ctx.lineWidth = 3;
                    ctx.beginPath();
                    ctx.arc(player.x, player.y, player.r + 10 + (24 - player.rewindFlash) * 0.8, 0, Math.PI * 2);
                    ctx.stroke();
                    ctx.shadowBlur = 0;
                }
                // 主体
                ctx.shadowColor = '#4ecca3';
                ctx.shadowBlur = 20;
                const grad = ctx.createRadialGradient(player.x - 4, player.y - 4, 3, player.x, player.y, player.r);
                if (flash) {
                    grad.addColorStop(0, '#ffffff');
                    grad.addColorStop(1, '#7effdb');
                } else {
                    grad.addColorStop(0, '#7effdb');
                    grad.addColorStop(1, '#4ecca3');
                }
                ctx.fillStyle = grad;
                ctx.beginPath();
                ctx.arc(player.x, player.y, player.r, 0, Math.PI * 2);
                ctx.fill();
                ctx.shadowBlur = 0;

                // 护盾指示器
                if (player.invincible > 0) {
                    ctx.strokeStyle = `rgba(78,204,163,${0.3 + 0.3 * Math.sin(Date.now() / 100)})`;
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    ctx.arc(player.x, player.y, player.r + 6, 0, Math.PI * 2);
                    ctx.stroke();
                }

                // 瞄准线
                ctx.strokeStyle = 'rgba(78,204,163,0.15)';
                ctx.lineWidth = 1.5;
                ctx.setLineDash([6, 8]);
                ctx.beginPath();
                ctx.moveTo(player.x, player.y);
                ctx.lineTo(mouseX, mouseY);
                ctx.stroke();
                ctx.setLineDash([]);

                // 准星
                const cx = mouseX,
                    cy = mouseY;
                ctx.strokeStyle = 'rgba(78,204,163,0.5)';
                ctx.lineWidth = 1.5;
                ctx.beginPath();
                ctx.arc(cx, cy, 10, 0, Math.PI * 2);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(cx - 14, cy);
                ctx.lineTo(cx - 6, cy);
                ctx.moveTo(cx + 6, cy);
                ctx.lineTo(cx + 14, cy);
                ctx.moveTo(cx, cy - 14);
                ctx.lineTo(cx, cy - 6);
                ctx.moveTo(cx, cy + 6);
                ctx.lineTo(cx, cy + 14);
                ctx.stroke();
            }

            // ─── UI ───
            ctx.shadowBlur = 0;

            // 左上：血量
            ctx.fillStyle = '#fff';
            ctx.font = '18px sans-serif';
            let hpStr = '';
            for (let i = 0; i < player.maxHp; i++) {
                hpStr += i < player.hp ? '❤️' : '🖤';
            }
            ctx.fillText(hpStr, 14, 26);

            // 分数 & 波次
            ctx.fillStyle = 'rgba(255,255,255,0.8)';
            ctx.font = '15px sans-serif';
            ctx.fillText('🏆 ' + score + '  |  第 ' + wave + ' 波', 14, 52);

            // 击杀数
            ctx.fillStyle = 'rgba(255,255,255,0.4)';
            ctx.font = '12px sans-serif';
            ctx.fillText('击杀 ' + totalEnemiesKilled + '  |  剩余 ' + enemies.length + ' 敌人', 14, 72);

            // ── 右下：回溯能量条 ──
            const barX = W - 190,
                barY = H - 50,
                barW = 170,
                barH = 22;
            ctx.fillStyle = 'rgba(0,0,0,0.5)';
            ctx.roundRect ? ctx.roundRect(barX, barY, barW, barH, 6) : 0;
            ctx.fillRect(barX, barY, barW, barH);

            const cooldownRatio = player.rewindReady ? 1 : (1 - player.rewindCooldown / REWIND_COOLDOWN);
            const gradBar = ctx.createLinearGradient(barX, barY, barX + barW, barY);
            if (player.rewindReady) {
                gradBar.addColorStop(0, '#00d4ff');
                gradBar.addColorStop(1, '#4ecca3');
            } else {
                gradBar.addColorStop(0, '#1a3a5c');
                gradBar.addColorStop(1, '#0d2137');
            }
            ctx.fillStyle = gradBar;
            ctx.fillRect(barX + 2, barY + 2, (barW - 4) * cooldownRatio, barH - 4);

            // 能量文字
            ctx.fillStyle = player.rewindReady ? '#00d4ff' : 'rgba(255,255,255,0.5)';
            ctx.font = 'bold 13px sans-serif';
            ctx.textAlign = 'center';
            const label = player.rewindReady ? '✦ 回溯就绪 [空格/Shift]"' : '⟳ 充能中 ' + Math.ceil((1 - cooldownRatio) * 100) + '%';
            ctx.fillText(label, barX + barW / 2, barY + 16);
            ctx.textAlign = 'left';

            // 回溯按键提示
            if (player.rewindReady && enemies.length > 0) {
                ctx.globalAlpha = 0.5 + 0.5 * Math.sin(Date.now() / 400);
                ctx.fillStyle = '#00d4ff';
                ctx.font = '12px sans-serif';
                ctx.textAlign = 'center';
                ctx.fillText('[ 按 空格 / Shift 回溯时间 ]', W / 2, H - 18);
                ctx.textAlign = 'left';
                ctx.globalAlpha = 1;
            }

            // ── 回溯特效：屏幕闪蓝 ──
            if (player.rewindFlash > 8) {
                ctx.fillStyle = `rgba(0,212,255,${(player.rewindFlash - 8) / 30 * 0.2})`;
                ctx.fillRect(0, 0, W, H);
            }

            // ── 时间逆转文字 ──
            if (player.isRewinding) {
                ctx.save();
                ctx.globalAlpha = 0.8;
                ctx.fillStyle = '#00d4ff';
                ctx.font = 'bold 48px sans-serif';
                ctx.textAlign = 'center';
                ctx.shadowColor = '#00d4ff';
                ctx.shadowBlur = 60;
                ctx.fillText('⟳ 时间逆转', W / 2, H / 2 - 10);
                ctx.shadowBlur = 0;
                ctx.font = '16px sans-serif';
                ctx.fillStyle = 'rgba(255,255,255,0.6)';
                ctx.fillText('命运重构', W / 2, H / 2 + 40);
                ctx.textAlign = 'left';
                ctx.restore();
            }

            // ── Game Over ──
            if (gameOver) {
                ctx.fillStyle = 'rgba(0,0,0,0.75)';
                ctx.fillRect(0, 0, W, H);
                ctx.fillStyle = '#ff6b6b';
                ctx.font = 'bold 44px sans-serif';
                ctx.textAlign = 'center';
                ctx.shadowColor = '#ff6b6b';
                ctx.shadowBlur = 30;
                ctx.fillText('💥 时空破碎', W / 2, H / 2 - 20);
                ctx.shadowBlur = 0;
                ctx.font = '20px sans-serif';
                ctx.fillStyle = 'rgba(255,255,255,0.7)';
                ctx.fillText('最终分数: ' + score + '  |  突破第 ' + wave + ' 波', W / 2, H / 2 + 40);
                ctx.font = '16px sans-serif';
                ctx.fillStyle = 'rgba(255,255,255,0.4)';
                ctx.fillText('按 R 键重新开始', W / 2, H / 2 + 80);
                ctx.textAlign = 'left';
            }

            // ── 胜利 ──
            if (gameWon) {
                ctx.fillStyle = 'rgba(0,0,0,0.7)';
                ctx.fillRect(0, 0, W, H);
                ctx.fillStyle = '#4ecca3';
                ctx.font = 'bold 44px sans-serif';
                ctx.textAlign = 'center';
                ctx.shadowColor = '#4ecca3';
                ctx.shadowBlur = 40;
                ctx.fillText('🏆 时空主宰', W / 2, H / 2 - 20);
                ctx.shadowBlur = 0;
                ctx.font = '22px sans-serif';
                ctx.fillStyle = 'rgba(255,255,255,0.8)';
                ctx.fillText('最终分数: ' + score + '  |  击败 ' + totalEnemiesKilled + ' 敌人', W / 2, H / 2 + 40);
                ctx.font = '16px sans-serif';
                ctx.fillStyle = 'rgba(255,255,255,0.4)';
                ctx.fillText('按 R 键重新开始', W / 2, H / 2 + 80);
                ctx.textAlign = 'left';
            }

            // 调试：回溯历史长度（开发用，可注释掉）
            // ctx.fillStyle = 'rgba(255,255,255,0.2)';
            // ctx.font = '11px sans-serif';
            // ctx.fillText('历史帧: ' + player.history.length + ' 冷却: ' + player.rewindCooldown, 14, H - 14);
        }

        // ─── 重启 ───
        function restart() {
            player.x = W / 2;
            player.y = H / 2;
            player.hp = MAX_HP;
            player.maxHp = MAX_HP;
            player.invincible = 0;
            player.history = [];
            player.rewindReady = true;
            player.rewindCooldown = 0;
            player.rewindFlash = 0;
            player.isRewinding = false;
            bullets = [];
            enemyBullets = [];
            enemies = [];
            particles = [];
            pickups = [];
            score = 0;
            wave = 1;
            enemiesSpawned = 0;
            enemiesPerWave = 4;
            spawnTimer = 10;
            fireCooldown = 0;
            totalEnemiesKilled = 0;
            gameOver = false;
            gameWon = false;
        }

        // ─── 游戏循环 ───
        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        // ─── 启动 ───
        gameLoop();

        // ─── 响应式 ───
        function resize() {
            const scale = Math.min(window.innerWidth / W, window.innerHeight / H, 1.2);
            canvas.style.width = (W * scale) + 'px';
            canvas.style.height = (H * scale) + 'px';
        }
        window.addEventListener('resize', resize);
        resize();

        // ─── 说明 ───
        console.log('🎮 时空逆转 · 弹幕射手');
        console.log('WASD 移动 | 鼠标瞄准射击 | 空格/Shift 回溯时间');
        console.log('在弹幕中预判走位，逆转战局！');
    </script>
</body>
</html>
